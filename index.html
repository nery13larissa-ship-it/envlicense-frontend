<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EnvLicense — PetroRecôncavo</title>
<style>
:root{--primary:#007023;--primary-hover:#005a1c;--primary-light:#4EA72E;--primary-tint:#e8f5ec;--success:#4EA72E;--warning:#F9CE29;--warning-text:#7a5e00;--danger:#9D2928;--danger-hover:#7a1f1e;--danger-tint:#fbeded;--info:#125E81;--text:#1d1d1f;--text-2:#6e6e73;--text-3:#86868b;--border:#d2d2d7;--border-light:#f5f5f7;--bg:#fbfbfd;--surface:#ffffff;--r-sm:8px;--r:12px;--ease:cubic-bezier(.4,0,.2,1)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.47;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh;font-weight:400;letter-spacing:-.003em}
.sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border-light);padding:24px 14px;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 20px;margin-bottom:4px}
.brand-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.brand-text{display:flex;flex-direction:column;line-height:1.2}
.brand-name{font-weight:600;font-size:15px;letter-spacing:-.02em;color:var(--text)}
.brand-sub{font-size:10px;color:var(--text-3);font-weight:400;letter-spacing:.02em;margin-top:2px}
.nav-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;padding:14px 10px 6px}
nav button{width:100%;background:transparent;color:var(--text-2);border:none;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:400;display:flex;align-items:center;transition:all .2s var(--ease);text-align:left;font-family:inherit;margin-bottom:1px}
nav button:hover{background:var(--border-light);color:var(--text)}
nav button.active{background:var(--primary-tint);color:var(--primary);font-weight:500}
.sidebar-footer{margin-top:auto;padding:14px 10px;font-size:11px;color:var(--text-3);border-top:1px solid var(--border-light)}
main{flex:1;padding:24px 36px 64px;max-width:100%;overflow-x:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px}
.search-trigger{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border-light);border-radius:10px;padding:8px 14px;cursor:pointer;color:var(--text-3);font-size:13px;font-family:inherit;transition:all .15s var(--ease);min-width:280px;max-width:380px}
.search-trigger:hover{border-color:var(--border);background:var(--bg)}
.search-trigger svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.search-trigger .placeholder{flex:1;text-align:left}
.search-trigger .shortcut{font-size:11px;background:var(--border-light);padding:2px 6px;border-radius:4px;color:var(--text-2);font-weight:500}
.page-header{margin-bottom:24px}
h1{font-size:30px;font-weight:600;letter-spacing:-.022em;color:var(--text);margin-bottom:4px;line-height:1.1}
.subtitle{color:var(--text-2);font-size:15px;font-weight:400}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--surface);padding:20px 22px;border-radius:var(--r);border:1px solid var(--border-light)}
.kpi-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.kpi-value{font-size:30px;font-weight:600;margin-top:8px;letter-spacing:-.022em;color:var(--text);line-height:1}
.kpi-sub{font-size:13px;color:var(--text-3);margin-top:6px}
.donut-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px;margin-bottom:20px}
.donut-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r);padding:22px}
.card-title{font-size:11px;font-weight:600;margin-bottom:18px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em}
.donut-wrap{display:flex;align-items:center;gap:28px;flex-wrap:wrap;justify-content:center}
.donut-svg{position:relative;flex-shrink:0}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.donut-center .big{font-size:30px;font-weight:600;letter-spacing:-.022em;line-height:1;color:var(--text)}
.donut-center .small{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-top:6px;font-weight:600}
.donut-legend{display:flex;flex-direction:column;gap:10px;min-width:180px;flex:1}
.legend-item{display:flex;align-items:center;gap:10px;font-size:13px}
.legend-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.legend-label{flex:1;color:var(--text-2)}
.legend-value{font-weight:600;font-variant-numeric:tabular-nums;color:var(--text)}
.legend-pct{font-size:11px;color:var(--text-3);margin-left:6px;font-weight:400}
.op-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-bottom:20px}
.op-card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r);padding:22px;position:relative;overflow:hidden}
.op-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--success)}
.op-card.inj::before{background:var(--info)}
.op-header{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:8px}
.op-dot{width:8px;height:8px;border-radius:50%;background:var(--success)}
.op-card.inj .op-dot{background:var(--info)}
.op-value{font-size:38px;font-weight:600;letter-spacing:-.024em;color:var(--text);line-height:1;margin-bottom:12px}
.op-meta{display:flex;flex-direction:column;gap:3px;font-size:13px;color:var(--text-2)}
.op-meta strong{color:var(--danger);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r);padding:22px;margin-bottom:14px}
.toolbar{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r);padding:12px;margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.input,.select{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;font-size:13.5px;color:var(--text);outline:none;font-family:inherit;transition:all .15s var(--ease)}
.input:focus,.select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,112,35,.1)}
.input{flex:1;min-width:200px}
.select{min-width:140px}
.btn{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:var(--r-sm);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s var(--ease);font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--primary-hover)}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border-light);color:var(--text)}
.btn-success{background:var(--primary-light)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:var(--danger-hover)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.icon-btn{background:transparent;border:none;cursor:pointer;padding:6px;border-radius:6px;color:var(--text-3);transition:all .15s var(--ease);display:inline-flex;align-items:center;justify-content:center}
.icon-btn:hover{background:var(--danger-tint);color:var(--danger)}
.icon-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.table-wrap{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r);overflow:hidden;overflow-x:auto}
.table{width:100%;border-collapse:collapse}
.table th{text-align:left;padding:13px 16px;font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;border-bottom:1px solid var(--border-light);background:var(--bg)}
.table td{padding:13px 16px;border-bottom:1px solid var(--border-light);font-size:13.5px;color:var(--text)}
.table tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:6px;font-size:12px;font-weight:500;white-space:nowrap}
.badge-dot{width:6px;height:6px;border-radius:50%}
.b-ok{background:#e8f5ec;color:#1f5f33}
.b-ok .badge-dot{background:var(--success)}
.b-upcoming{background:#fef7d8;color:var(--warning-text)}
.b-upcoming .badge-dot{background:var(--warning)}
.b-expired{background:var(--danger-tint);color:var(--danger)}
.b-expired .badge-dot{background:var(--danger)}
.b-missing{background:#f5d4d4;color:#6b1c1c}
.b-missing .badge-dot{background:#6b1c1c}
.b-prod{background:#e8f5ec;color:#1f5f33}
.b-inj{background:#deeef5;color:#0d4a66}
.b-other{background:var(--border-light);color:var(--text-2)}
.b-pend{background:#e8ecf5;color:#1e3a8a}
.b-done{background:#e8f5ec;color:#1f5f33}
.b-overdue{background:var(--danger-tint);color:var(--danger)}
.b-ba{background:#deeef5;color:#0d4a66}
.b-rn{background:#fef7d8;color:var(--warning-text)}
.b-se{background:#e8f5ec;color:#1f5f33}
.pdf-link{color:var(--primary);text-decoration:none;font-weight:500;font-size:13px;display:inline-flex;align-items:center;gap:5px}
.pdf-link svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.empty{padding:40px 20px;text-align:center;color:var(--text-3);font-size:14px}
.loading{text-align:center;padding:40px;color:var(--text-3);font-size:14px;display:flex;align-items:center;justify-content:center;gap:10px}
.error{background:var(--danger-tint);color:var(--danger);padding:12px 14px;border-radius:var(--r-sm);margin:12px 0;font-size:13.5px;border:1px solid #f5c6c6}
.warn{background:#fef7d8;color:var(--warning-text);padding:10px 14px;border-radius:var(--r-sm);margin:12px 0;font-size:13px;border:1px solid #f0d878}
.success{background:#e8f5ec;color:#1f5f33;padding:12px 14px;border-radius:var(--r-sm);margin:12px 0;font-size:13.5px;border:1px solid #c5e3d0}
.upload-box{background:var(--surface);padding:28px;border-radius:var(--r);border:1.5px dashed var(--border);text-align:center;margin-bottom:18px}
.upload-box h3{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--text)}
.upload-box p{color:var(--text-2);font-size:13.5px;margin-bottom:14px}
.pagination{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;color:var(--text-2);font-size:13px}
.chart-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:14px;margin-bottom:14px}
.bar-list{list-style:none;display:flex;flex-direction:column;gap:11px;margin-top:4px}
.bar-item{display:flex;align-items:center;gap:14px;font-size:13px}
.bar-label{min-width:130px;font-weight:500;font-size:13px;color:var(--text)}
.bar-track{flex:1;height:6px;background:var(--border-light);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s var(--ease)}
.bar-value{min-width:90px;text-align:right;color:var(--text-2);font-variant-numeric:tabular-nums;font-size:13px}
.bar-value strong{color:var(--danger);font-weight:600}
.summary-bar{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--r-sm);padding:11px 14px;margin-bottom:12px;font-size:13px;color:var(--text-2)}
.summary-bar strong{color:var(--text);font-weight:600}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border-light);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spotlight-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:10vh}
.spotlight-overlay.show{display:flex}
.spotlight{background:var(--surface);border-radius:14px;width:100%;max-width:640px;box-shadow:0 24px 64px rgba(0,0,0,.18);overflow:hidden}
.spotlight-input-wrap{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border-light)}
.spotlight-input-wrap svg{width:20px;height:20px;stroke:var(--text-3);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.spotlight-input{flex:1;border:none;outline:none;font-size:17px;font-family:inherit;color:var(--text);background:transparent}
.spotlight-close{font-size:11px;background:var(--border-light);padding:3px 8px;border-radius:5px;color:var(--text-2);font-weight:500;cursor:pointer;border:none;font-family:inherit}
.spotlight-results{max-height:60vh;overflow-y:auto;padding:8px 0}
.sp-section-title{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;padding:8px 20px 6px}
.sp-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;transition:background .12s var(--ease)}
.sp-item:hover{background:var(--bg)}
.sp-item-icon{width:28px;height:28px;border-radius:6px;background:var(--border-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-2);font-size:11px;font-weight:600}
.sp-item-icon.a{background:var(--primary-tint);color:var(--primary)}
.sp-item-icon.l{background:#deeef5;color:#0d4a66}
.sp-item-icon.c{background:#fef7d8;color:var(--warning-text)}
.sp-item-content{flex:1;min-width:0}
.sp-item-title{font-size:14px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-item-sub{font-size:12px;color:var(--text-3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-empty{padding:32px 20px;text-align:center;color:var(--text-3);font-size:13.5px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:520px;box-shadow:0 24px 64px rgba(0,0,0,.18);overflow:hidden}
.modal-header{padding:22px 24px 12px}
.modal-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.modal-icon.warn{background:#fef7d8;color:var(--warning-text)}
.modal-icon.danger{background:var(--danger-tint);color:var(--danger)}
.modal-icon svg{width:24px;height:24px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.modal-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
.modal-subtitle{font-size:14px;color:var(--text-2);line-height:1.5}
.modal-body{padding:8px 24px 0}
.modal-info{background:var(--bg);border:1px solid var(--border-light);border-radius:var(--r-sm);padding:14px 16px;font-size:13px;color:var(--text-2);margin:12px 0}
.modal-info strong{color:var(--text);font-weight:600}
.modal-info .row{display:flex;justify-content:space-between;padding:3px 0}
.modal-actions{padding:20px 24px;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;border-top:1px solid var(--border-light);margin-top:18px}
@media(max-width:900px){
.sidebar{position:fixed;left:-260px;z-index:100;transition:left .3s var(--ease);box-shadow:0 0 40px rgba(0,0,0,.1);width:240px}
.sidebar.open{left:0}
main{padding:18px 16px 48px}
.menu-toggle{display:flex !important}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99;display:none}
.overlay.show{display:block}
h1{font-size:24px}
.search-trigger .placeholder{display:none}
.search-trigger{min-width:0;flex:1}
}
.menu-toggle{display:none;background:var(--surface);border:1px solid var(--border);padding:8px 12px;border-radius:8px;cursor:pointer;align-items:center;gap:8px;font-family:inherit;color:var(--text)}
.menu-toggle svg{width:18px;height:18px;stroke:var(--text);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<aside class="sidebar" id="sidebar">
<div class="brand">
<div class="brand-mark">PR</div>
<div class="brand-text">
<span class="brand-name">EnvLicense</span>
<span class="brand-sub">PetroRecôncavo</span>
</div>
</div>
<div class="nav-label">Geral</div>
<nav>
<button class="active" data-tab="dashboard">Visão executiva</button>
<button data-tab="assets">Ativos & Compliance</button>
</nav>
<div class="nav-label">Documentos</div>
<nav>
<button data-tab="licenses">Licenças</button>
<button data-tab="conditions">Condicionantes</button>
</nav>
<div class="sidebar-footer">EnvLicense · v4.6</div>
</aside>
<main>
<div class="topbar">
<button class="menu-toggle" onclick="toggleMenu()">
<svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div></div>
<button class="search-trigger" onclick="openSpotlight()">
<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<span class="placeholder">Buscar em todo o sistema</span>
<span class="shortcut">⌘K</span>
</button>
</div>
<div id="app"><div class="loading"><span class="spinner"></span> Carregando</div></div>
</main>

<div class="spotlight-overlay" id="spotlight" onclick="if(event.target===this) closeSpotlight()">
<div class="spotlight">
<div class="spotlight-input-wrap">
<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input type="text" class="spotlight-input" id="spotlightInput" placeholder="Buscar ativos, licenças, condicionantes...">
<button class="spotlight-close" onclick="closeSpotlight()">esc</button>
</div>
<div class="spotlight-results" id="spotlightResults">
<div class="sp-empty">Digite pelo menos 2 caracteres para buscar</div>
</div>
</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
<div class="modal" id="modalContent"></div>
</div>

<script>
const API="https://envlicense-backend.onrender.com";
let filterCache=null;
let assetState={page:0,filters:{},search:""};
let searchTimer=null;
let pendingFile=null;

// ===== Helpers de fetch com timeout e tratamento de erro =====
async function safeFetch(url, options={}){
  const ctrl = new AbortController();
  const timeoutMs = options.timeout || 60000;
  const timer = setTimeout(()=>ctrl.abort(), timeoutMs);
  try{
    const r = await fetch(url, {...options, signal: ctrl.signal});
    clearTimeout(timer);
    return await r.json();
  }catch(e){
    clearTimeout(timer);
    console.error("Fetch error:", url, e);
    return null;
  }
}

fetch(`${API}/health`).catch(()=>{});

function toggleMenu(){document.getElementById("sidebar").classList.toggle("open");document.getElementById("overlay").classList.toggle("show");}
function closeMenu(){document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").classList.remove("show");}

document.querySelectorAll("nav button").forEach(b=>{b.addEventListener("click",()=>{show(b.dataset.tab,b);closeMenu();});});

function openSpotlight(){document.getElementById("spotlight").classList.add("show");setTimeout(()=>document.getElementById("spotlightInput").focus(),50);}
function closeSpotlight(){document.getElementById("spotlight").classList.remove("show");document.getElementById("spotlightInput").value="";document.getElementById("spotlightResults").innerHTML='<div class="sp-empty">Digite pelo menos 2 caracteres para buscar</div>';}

function openModal(html){document.getElementById("modalContent").innerHTML=html;document.getElementById("modalOverlay").classList.add("show");}
function closeModal(){document.getElementById("modalOverlay").classList.remove("show");}

document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();openSpotlight();}
  if(e.key==="Escape"){closeSpotlight();closeModal();}
});

document.getElementById("spotlightInput").addEventListener("input",e=>{
  const q=e.target.value.trim();
  clearTimeout(searchTimer);
  if(q.length<2){document.getElementById("spotlightResults").innerHTML='<div class="sp-empty">Digite pelo menos 2 caracteres para buscar</div>';return;}
  searchTimer=setTimeout(()=>doSearch(q),250);
});

async function doSearch(q){
  const div=document.getElementById("spotlightResults");
  div.innerHTML='<div class="loading"><span class="spinner"></span> Buscando</div>';
  const r = await safeFetch(`${API}/search?q=${encodeURIComponent(q)}`);
  if(!r){div.innerHTML='<div class="sp-empty">Erro na busca</div>';return;}
  if(r.total===0){div.innerHTML=`<div class="sp-empty">Nenhum resultado para "${q}"</div>`;return;}
  let html='';
  if(r.assets&&r.assets.length){

async function show(tab,btn){

  const app=document.getElementById("app");

  try{

}

function badgeCompliance(s){const map={ok:["b-ok","Licença ativa"],upcoming:["b-upcoming","Próxima ao vencimento"],expired:["b-expired","Licença vencida"],missing:["b-missing","Sem licença"]};const[cls,txt]=map[s]||["b-other",s];return `<span class="badge ${cls}"><span class="badge-dot"></span>${txt}</span>`;}
function badgeSituation(s){if(!s) return '<span class="badge b-other">—</span>';if(s==="PRODUZINDO") return `<span class="badge b-prod"><span class="badge-dot" style="background:#4EA72E"></span>${s}</span>`;if(s==="INJETANDO") return `<span class="badge b-inj"><span class="badge-dot" style="background:#125E81"></span>${s}</span>`;return `<span class="badge b-other">${s.slice(0,18)}</span>`;}
function badgeState(s){return `<span class="badge b-${(s||'').toLowerCase()}">${s||'—'}</span>`;}

function buildDonut(segments, size=180, thickness=22, centerBig, centerSmall){
  const total = segments.reduce((s,x)=>s+x.value, 0);
  if(total===0) return `<div class="donut-svg"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${size/2-thickness/2}" fill="none" stroke="#f5f5f7" stroke-width="${thickness}"/></svg><div class="donut-center"><div class="big">0</div><div class="small">${centerSmall||''}</div></div></div>`;
  const cx=size/2, cy=size/2, r=size/2-thickness/2, C=2*Math.PI*r;
  let offset=0;
  const circles=segments.map(seg=>{const frac=seg.value/total;const len=C*frac;const dashArray=`${len} ${C-len}`;const circle=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${thickness}" stroke-dasharray="${dashArray}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;offset+=len;return circle;}).join('');
  return `<div class="donut-svg"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f5f5f7" stroke-width="${thickness}"/>${circles}</svg><div class="donut-center"><div class="big">${centerBig}</div><div class="small">${centerSmall||''}</div></div></div>`;
}

function buildPie(segments, size=180){
  const total = segments.reduce((s,x)=>s+x.value, 0);
  if(total===0) return `<div class="donut-svg"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="#f5f5f7"/></svg></div>`;
  if(segments.filter(s=>s.value>0).length===1){const seg=segments.find(s=>s.value>0);return `<div class="donut-svg"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="${seg.color}"/></svg></div>`;}
  const cx=size/2, cy=size/2, r=size/2-2;
  let cumAngle=-Math.PI/2;
  const paths=segments.map(seg=>{if(seg.value===0) return '';const frac=seg.value/total;const angle=frac*2*Math.PI;const x1=cx+r*Math.cos(cumAngle);const y1=cy+r*Math.sin(cumAngle);cumAngle+=angle;const x2=cx+r*Math.cos(cumAngle);const y2=cy+r*Math.sin(cumAngle);const largeArc=angle>Math.PI?1:0;return `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${seg.color}"/>`;}).join('');
  return `<div class="donut-svg"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg></div>`;
}

function legendHtml(segments, total){
  return segments.filter(s=>s.value>0||s.alwaysShow).map(s=>{const pct = total>0 ? Math.round(s.value/total*100) : 0;return `<div class="legend-item"><span class="legend-dot" style="background:${s.color}"></span><span class="legend-label">${s.label}</span><span class="legend-value">${s.value}<span class="legend-pct">(${pct}%)</span></span></div>`;}).join('');
}

function buildAssetParams(){
  const p=new URLSearchParams();
  if(assetState.filters.aState) p.set("state",assetState.filters.aState);
  if(assetState.filters.aAgency) p.set("agency",assetState.filters.aAgency);
  if(assetState.filters.aField) p.set("field",assetState.filters.aField);
  if(assetState.filters.aOp) p.set("operational",assetState.filters.aOp);
  if(assetState.filters.aStatus) p.set("compliance_status",assetState.filters.aStatus);
  if(assetState.search) p.set("search",assetState.search);
  return p;
}

async function loadAssets(){

  p.set("limit","50");p.set("offset",String(assetState.page*50));

  const critical=r.items.filter(i=>i.compliance_status==='expired'||i.compliance_status==='missing').length;

  const totalPages=Math.ceil(r.total/50);
  const curPage=assetState.page+1;
  div.innerHTML=`<div class="summary-bar">Mostrando <strong>${r.items.length}</strong> de <strong>${r.total}</strong> ativos · <strong>${critical}</strong> em estado crítico nesta página</div><div class="table-wrap"><table class="table"><thead><tr><th>Código</th><th>Campo</th><th>UF</th><th>Órgão</th><th>Situação Op.</th><th>Status regulatório</th><th>Validade</th><th>PDF</th></tr></thead><tbody>${rows}</tbody></table></div><div class="pagination"><span>Página ${curPage} de ${totalPages}</span><div style="display:flex;gap:8px"><button class="btn btn-ghost" id="aPrev" ${assetState.page===0?'disabled':''}>← Anterior</button><button class="btn btn-ghost" id="aNext" ${curPage>=totalPages?'disabled':''}>Próxima →</button></div></div>`;
  document.getElementById("aPrev").onclick=()=>{if(assetState.page>0){assetState.page--;loadAssets();}};
  document.getElementById("aNext").onclick=()=>{if(curPage<totalPages){assetState.page++;loadAssets();}};
}

async function uploadPdf(onDuplicate, fileToUse){
  const fileInput=document.getElementById("pdfFile");
  const status=document.getElementById("upStatus");
  const btn=document.getElementById("upBtn");
  const file = fileToUse || (fileInput && fileInput.files[0]);
  if(!file){status.innerHTML='<div class="error">Selecione um PDF.</div>';return;}
  if(btn){btn.disabled=true;btn.textContent="Processando... (30-90s)";}
  status.innerHTML='<div class="loading"><span class="spinner"></span> A IA está analisando o documento</div>';
  pendingFile=file;
  const fd=new FormData();
  fd.append("file",file);
  try{
    const r=await fetch(`${API}/licenses/upload?on_duplicate=${onDuplicate}`,{method:"POST",body:fd}).then(r=>r.json());
    if(r.error){status.innerHTML=`<div class="error">Erro: ${r.error}</div>`;}
    else if(r.duplicate){status.innerHTML='';showDuplicateModal(r.existing, r.new_data);}
    else if(r.cancelled){status.innerHTML='<div class="error">Upload cancelado.</div>';}
    else{
      const actionMsg=r.action==="replace"?"substituída":r.action==="keep_both"?"adicionada (mantendo a anterior)":"cadastrada";
      status.innerHTML=`<div class="success">Licença ${actionMsg}. ${r.conditions_extracted} condicionantes extraídas.</div>`;
      pendingFile=null;
      setTimeout(()=>show("licenses"),1800);
    }
  }catch(e){status.innerHTML=`<div class="error">Erro: ${e.message}</div>`;}
  finally{if(btn){btn.disabled=false;btn.textContent="Enviar para análise";}}
}

      </div>
      <div class="modal-info">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#86868b;font-weight:600;margin-bottom:8px">Novo upload</div>
        <div class="row"><span>Número</span><strong>${newData.number||'—'}</strong></div>
        <div class="row"><span>Validade</span><strong>${newData.expiry_date||'—'}</strong></div>
        <div class="row"><span>Condicionantes extraídas</span><strong>${newData.n_conditions_extracted}</strong></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="cancelDuplicate()">Cancelar</button>
      <button class="btn btn-ghost" onclick="resolveDuplicate('keep_both')">Manter ambas</button>
      <button class="btn btn-danger" onclick="resolveDuplicate('replace')">Substituir</button>
    </div>
  `);
}

function cancelDuplicate(){closeModal();pendingFile=null;document.getElementById("upStatus").innerHTML='<div class="error">Upload cancelado.</div>';}

async function resolveDuplicate(action){if(!pendingFile){closeModal();return;}closeModal();await uploadPdf(action, pendingFile);}

async function renderConditions(){
  const app=document.getElementById("app");
  const list = await safeFetch(`${API}/conditions`) || [];
  let html=`<div class="page-header"><h1>Condicionantes</h1><p class="subtitle">Obrigações técnicas extraídas das licenças ambientais</p></div>`;
  if(!list||list.length===0){html+='<div class="card"><div class="empty">Nenhuma condicionante cadastrada</div></div>';}
  else{
    const catMap={"monitoring":"Monitoramento","effluent":"Efluentes","reporting":"Relatórios","infrastructure":"Infraestrutura","other":"Outros"};
    const rows=list.map(c=>{
      let badge='<span class="badge b-pend"><span class="badge-dot" style="background:#1e3a8a"></span>Pendente</span>';
      if(c.status==='completed') badge='<span class="badge b-done"><span class="badge-dot" style="background:#4EA72E"></span>Concluída</span>';
      else if(c.days_until_due!==null&&c.days_until_due<0) badge='<span class="badge b-overdue"><span class="badge-dot" style="background:#9D2928"></span>Vencida</span>';
      else if(c.days_until_due!==null&&c.days_until_due<=30) badge=`<span class="badge b-upcoming"><span class="badge-dot" style="background:#F9CE29"></span>${c.days_until_due}d</span>`;
      const catLabel=catMap[c.category]||c.category;
      return `<tr><td>${c.description}</td><td><span class="badge b-other">${catLabel}</span></td><td>${c.license_number}</td><td style="font-variant-numeric:tabular-nums">${c.due_date||'—'}</td><td>${badge}</td></tr>`;
    }).join('');
    html+=`<div class="table-wrap"><table class="table"><thead><tr><th>Descrição</th><th>Categoria</th><th>Licença</th><th>Vencimento</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }
  app.innerHTML=html;
}

show("dashboard");
</script>
