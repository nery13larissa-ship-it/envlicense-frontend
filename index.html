<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EnvLicense MVP</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #fafaf9; color: #1c1917; }
  header { background: #0a2540; color: white; padding: 16px 24px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  header h1 { font-size: 20px; }
  header h1 span { font-size: 11px; opacity: 0.6; margin-left: 6px; }
  nav { display: flex; gap: 6px; }
  nav button { background: transparent; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  nav button.active { background: rgba(255,255,255,0.15); }
  main { max-width: 1100px; margin: 0 auto; padding: 24px; }
  h2 { font-size: 26px; margin-bottom: 20px; }
  h3 { font-size: 18px; margin: 16px 0 10px; }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; }
  .kpi { background: white; padding: 18px; border-radius: 12px; border: 1px solid #e7e5e4; }
  .kpi-label { font-size: 11px; color: #78716c; text-transform: uppercase; letter-spacing: 1px; }
  .kpi-value { font-size: 32px; font-weight: 700; margin-top: 6px; }
  .empty { background: white; padding: 48px; border-radius: 12px; border: 1px solid #e7e5e4; text-align: center; color: #a8a29e; }
  .loading { text-align: center; padding: 32px; color: #a8a29e; }
  .upload-box { background: white; padding: 24px; border-radius: 12px; border: 2px dashed #cbd5e1; text-align: center; margin-bottom: 20px; }
  .upload-box input { margin: 12px 0; }
  .upload-box button { background: #0a2540; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; cursor: pointer; }
  .upload-box button:disabled { opacity: 0.5; cursor: not-allowed; }
  .card { background: white; padding: 16px; border-radius: 10px; border: 1px solid #e7e5e4; margin-bottom: 10px; }
  .card-title { font-weight: 600; margin-bottom: 6px; }
  .card-meta { font-size: 13px; color: #78716c; }
  .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 6px; }
  .badge-overdue { background: #fee2e2; color: #991b1b; }
  .badge-upcoming { background: #fef3c7; color: #92400e; }
  .badge-pending { background: #e0e7ff; color: #3730a3; }
  .badge-completed { background: #d1fae5; color: #065f46; }
  .success { background: #d1fae5; color: #065f46; padding: 12px; border-radius: 8px; margin: 12px 0; }
  .error { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; margin: 12px 0; }
</style>
</head>
<body>

<header>
  <h1>EnvLicense <span>MVP</span></h1>
  <nav>
    <button class="active" onclick="show('dashboard', this)">Dashboard</button>
    <button onclick="show('licenses', this)">Licenças</button>
    <button onclick="show('conditions', this)">Condicionantes</button>
  </nav>
</header>

<main id="content"><div class="loading">Carregando...</div></main>

<script>
const API = "https://envlicense-backend.onrender.com";

async function show(tab, btn) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  const c = document.getElementById("content");
  c.innerHTML = '<div class="loading">Carregando... (primeira vez pode demorar 30s)</div>';
  try {
    if (tab === "dashboard") await renderDashboard();
    else if (tab === "licenses") await renderLicenses();
    else await renderConditions();
  } catch(e) {
    c.innerHTML = '<div class="error">Erro ao conectar. Tente recarregar.</div>';
  }
}

async function renderDashboard() {
  const r = await fetch(`${API}/dashboard`).then(r=>r.json());
  document.getElementById("content").innerHTML = `
    <h2>Painel</h2>
    <div class="kpis">
      <div class="kpi"><div class="kpi-label">Licenças</div><div class="kpi-value">${r.total_licenses}</div></div>
      <div class="kpi"><div class="kpi-label">Condicionantes</div><div class="kpi-value">${r.total_conditions}</div></div>
      <div class="kpi"><div class="kpi-label">Vencidas</div><div class="kpi-value" style="color:#ef4444">${r.overdue}</div></div>
      <div class="kpi"><div class="kpi-label">Próx. 30 dias</div><div class="kpi-value" style="color:#f59e0b">${r.upcoming_30d}</div></div>
      <div class="kpi"><div class="kpi-label">Concluídas</div><div class="kpi-value" style="color:#10b981">${r.completed}</div></div>
    </div>`;
}

async function renderLicenses() {
  const c = document.getElementById("content");
  c.innerHTML = `
    <h2>Licenças</h2>
    <div class="upload-box">
      <h3>📄 Subir nova licença em PDF</h3>
      <p style="color:#78716c; font-size:14px; margin-top:6px;">A IA vai ler o documento e extrair as condicionantes.</p>
      <input type="file" id="pdfFile" accept=".pdf">
      <br>
      <button onclick="uploadPdf()" id="upBtn">Enviar para a IA</button>
      <div id="upStatus"></div>
    </div>
    <div id="listLic"><div class="loading">Carregando licenças...</div></div>`;

  const list = await fetch(`${API}/licenses`).then(r=>r.json());
  const div = document.getElementById("listLic");
  if (!list || list.length === 0) {
    div.innerHTML = '<div class="empty">Nenhuma licença ainda. Suba um PDF acima.</div>';
  } else {
    div.innerHTML = list.map(l => `
      <div class="card">
        <div class="card-title">${l.number} <span class="badge badge-pending">${l.type}</span></div>
        <div class="card-meta">${l.agency} • Vence em ${l.expiry_date || 'não informado'} • ${l.n_conditions} condicionantes</div>
      </div>
    `).join('');
  }
}

async function uploadPdf() {
  const fileInput = document.getElementById("pdfFile");
  const status = document.getElementById("upStatus");
  const btn = document.getElementById("upBtn");
  if (!fileInput.files[0]) {
    status.innerHTML = '<div class="error">Selecione um PDF primeiro.</div>';
    return;
  }
  btn.disabled = true;
  btn.textContent = "Processando... (30-60s)";
  status.innerHTML = '<div class="loading">🤖 A IA está lendo o PDF...</div>';

  const fd = new FormData();
  fd.append("file", fileInput.files[0]);

  try {
    const r = await fetch(`${API}/licenses/upload`, { method: "POST", body: fd }).then(r=>r.json());
    if (r.error) {
      status.innerHTML = `<div class="error">Erro: ${r.error}</div>`;
    } else {
      status.innerHTML = `<div class="success">✅ ${r.conditions_extracted} condicionantes extraídas! Recarregando...</div>`;
      setTimeout(() => show('licenses', document.querySelector('nav button:nth-child(2)')), 1500);
    }
  } catch(e) {
    status.innerHTML = `<div class="error">Erro: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Enviar para a IA";
  }
}
