<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EnvLicense — PetroRecôncavo</title>

<style>
:root{
  --p:#007023;
  --ph:#005a1c;
  --pl:#4EA72E;
  --pt:#e8f5ec;

  --wg:#8FBF21;

  --w:#F9CE29;
  --wt:#7a5e00;

  --r:#9D2928;
  --rh:#7a1f1e;
  --rt:#fbeded;

  --b:#125E81;
  --bt:#deeef5;

  --t1:#1d1d1f;
  --t2:#6e6e73;
  --t3:#86868b;
  --t4:#aeaeb2;

  --bd:#d2d2d7;
  --bdl:#f0f0f5;

  --bg:#f5f5f7;
  --s:#fff;

  --rad:12px;
  --rads:8px;

  --ease:cubic-bezier(.4,0,.2,1);

  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
  --shl:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.07);

  --sw:56px;
  --se:220px;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent
}

html,body{
  height:100%
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
  background:var(--bg);
  color:var(--t1);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  display:flex;
  overflow:hidden
}

/* SIDEBAR */

.sb{
  width:var(--sw);
  background:var(--s);
  border-right:1px solid var(--bdl);
  display:flex;
  flex-direction:column;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  z-index:100;
  overflow:hidden;
  transition:width .22s var(--ease);
  flex-shrink:0
}

.sb:hover{
  width:var(--se)
}

.sb-brand{
  display:flex;
  align-items:center;
  gap:10px;
  padding:16px 14px;
  border-bottom:1px solid var(--bdl);
  min-height:58px;
  overflow:hidden;
  white-space:nowrap
}

.sb-mark{
  width:28px;
  height:28px;
  min-width:28px;
  background:linear-gradient(135deg,var(--p),var(--pl));
  border-radius:7px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:700;
  font-size:12px
}

.sb-txt{
  opacity:0;
  transform:translateX(-8px);
  transition:all .18s var(--ease)
}

.sb:hover .sb-txt{
  opacity:1;
  transform:none
}

.sb-name{
  font-weight:600;
  font-size:13.5px;
  letter-spacing:-.02em
}

.sb-sub{
  font-size:10px;
  color:var(--t3)
}

.sb-sec{
  padding:6px 0
}

.sb-lbl{
  font-size:9px;
  color:var(--t4);
  text-transform:uppercase;
  letter-spacing:.08em;
  font-weight:700;
  padding:7px 16px 3px;
  opacity:0;
  transition:opacity .18s var(--ease)
}

.sb:hover .sb-lbl{
  opacity:1
}

.nb{
  width:100%;
  background:transparent;
  border:none;
  padding:7px 14px;
  cursor:pointer;
  font-family:inherit;
  display:flex;
  align-items:center;
  gap:11px;
  color:var(--t2);
  transition:all .13s var(--ease);
  min-height:38px;
  overflow:hidden;
  white-space:nowrap
}

.nb:hover{
  background:var(--bdl);
  color:var(--t1)
}

.nb.on{
  background:var(--pt);
  color:var(--p)
}

.nb-ic{
  width:20px;
  height:20px;
  min-width:20px;
  display:flex;
  align-items:center;
  justify-content:center
}

.nb-ic svg{
  width:15px;
  height:15px;
  stroke:currentColor;
  stroke-width:1.8;
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round
}

.nb-lbl{
  font-size:13px;
  opacity:0;
  transform:translateX(-5px);
  transition:all .18s var(--ease)
}

.sb:hover .nb-lbl{
  opacity:1;
  transform:none
}

.sb-foot{
  margin-top:auto;
  padding:10px 14px;
  border-top:1px solid var(--bdl);
  display:flex;
  align-items:center;
  gap:8px
}

.sb-ver{
  width:28px;
  height:28px;
  min-width:28px;
  background:var(--bdl);
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:9px;
  font-weight:700;
  color:var(--t3)
}

/* MAIN */

.main-wrap{
  margin-left:var(--sw);
  flex:1;
  height:100vh;
  overflow-y:auto;
  overflow-x:hidden;
  transition:margin-left .22s var(--ease);
  display:flex;
  flex-direction:column
}

.sb:hover~.main-wrap{
  margin-left:var(--se)
}

.topbar{
  background:var(--s);
  border-bottom:1px solid var(--bdl);
  padding:0 28px;
  height:54px;
  display:flex;
  align-items:center;
  gap:14px;
  position:sticky;
  top:0;
  z-index:50
}

.tb-ttl{
  font-size:14.5px;
  font-weight:600;
  letter-spacing:-.02em;
  flex:1
}

.cnt{
  padding:24px 28px 80px;
  flex:1
}

.loading{
  text-align:center;
  padding:40px;
  color:var(--t3)
}

.spin{
  display:inline-block;
  width:15px;
  height:15px;
  border:2px solid var(--bdl);
  border-top-color:var(--p);
  border-radius:50%;
  animation:spin .65s linear infinite
}

@keyframes spin{
  to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<aside class="sb">

  <div class="sb-brand">
    <div class="sb-mark">PR</div>

    <div class="sb-txt">
      <div class="sb-name">EnvLicense</div>
      <div class="sb-sub">PetroRecôncavo</div>
    </div>
  </div>

  <div class="sb-sec">
    <div class="sb-lbl">Geral</div>

    <button class="nb on" data-tab="dashboard">
      <span class="nb-ic">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </span>

      <span class="nb-lbl">Visão executiva</span>
    </button>
  </div>

  <div class="sb-sec">
    <div class="sb-lbl">Documentos</div>

    <button class="nb" data-tab="docs">
      <span class="nb-ic">
        <svg viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </span>

      <span class="nb-lbl">Central documental</span>
    </button>

    <button class="nb" data-tab="assets">
      <span class="nb-ic">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12"/>
        </svg>
      </span>

      <span class="nb-lbl">Ativos</span>
    </button>

    <button class="nb" data-tab="conditions">
      <span class="nb-ic">
        <svg viewBox="0 0 24 24">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5"/>
        </svg>
      </span>

      <span class="nb-lbl">Condicionantes</span>
    </button>
  </div>

  <div class="sb-sec">
    <div class="sb-lbl">Planejamento</div>

    <button class="nb" data-tab="planning">
      <span class="nb-ic">
        <svg viewBox="0 0 24 24">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </span>

      <span class="nb-lbl">Gestão financeira</span>
    </button>
  </div>

  <div class="sb-foot">
    <div class="sb-ver">v6</div>
  </div>

</aside>

<div class="main-wrap">

  <div class="topbar">
    <div class="tb-ttl" id="tb-ttl">Visão executiva</div>
  </div>

  <div class="cnt">
    <div id="app">
      <div class="loading">
        <span class="spin"></span>
        Carregando
      </div>
    </div>
  </div>

</div>

<script>
const API = "https://envlicense-backend.onrender.com";

let passiveDissolutionYears = 5;

const TABS = {
  dashboard:"Visão executiva",
  docs:"Central documental",
  assets:"Ativos",
  conditions:"Condicionantes",
  planning:"Gestão financeira"
};

async function sf(url,opts={}){
  const ctrl = new AbortController();

  const t = setTimeout(
    ()=>ctrl.abort(),
    opts.timeout || 18000
  );

  try{
    const r = await fetch(url,{
      ...opts,
      signal:ctrl.signal
    });

    clearTimeout(t);

    const txt = await r.text();

    let data = null;

    try{
      data = txt ? JSON.parse(txt) : null;
    }catch(e){
      console.error("Resposta não JSON",url,txt);
      return null;
    }

    if(!r.ok){
      console.error("API error",r.status,url,data);
      return null;
    }

    return data;

  }catch(e){
    clearTimeout(t);
    console.error("fetch failed",url,e.message);
    return null;
  }
}function fmtBRL(v){
  return "R$ " + Number(v || 0).toLocaleString(
    "pt-BR",
    {
      minimumFractionDigits:0,
      maximumFractionDigits:0
    }
  );
}

function setTab(tab){
  document.querySelectorAll(".nb")
    .forEach(b=>b.classList.remove("on"));

  const btn = document.querySelector(`[data-tab="${tab}"]`);

  if(btn) btn.classList.add("on");

  document.getElementById("tb-ttl").textContent =
    TABS[tab] || tab;

  if(tab==="dashboard") renderDashboard();
  if(tab==="assets") renderAssets();
  if(tab==="conditions") renderConditions();
  if(tab==="docs") renderDocs();
  if(tab==="planning") renderPlanning();
}

document.querySelectorAll(".nb")
  .forEach(btn=>{
    btn.onclick = ()=>setTab(btn.dataset.tab);
  });

/* DASHBOARD */

async function renderDashboard(){

  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="loading">
      <span class="spin"></span>
      Carregando visão executiva
    </div>
  `;

  const data = await sf(`${API}/executive/overview`);

  if(!data){
    app.innerHTML = `
      <div style="color:var(--r)">
        Erro ao carregar dashboard
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div style="margin-bottom:18px">
      <div style="font-size:26px;font-weight:700">
        Visão executiva
      </div>

      <div style="color:var(--t2)">
        Monitoramento regulatório consolidado
      </div>
    </div>

    <div style="
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:12px;
      margin-bottom:18px
    ">

      <div style="
        background:var(--s);
        border:1px solid var(--bdl);
        border-radius:14px;
        padding:18px;
        box-shadow:var(--sh)
      ">
        <div style="font-size:11px;color:var(--t3)">
          Conformidade Geral
        </div>

        <div style="
          font-size:38px;
          font-weight:700;
          color:var(--p)
        ">
          ${data.conformidade_geral || 0}%
        </div>
      </div>

      <div style="
        background:var(--s);
        border:1px solid var(--bdl);
        border-radius:14px;
        padding:18px;
        box-shadow:var(--sh)
      ">
        <div style="font-size:11px;color:var(--t3)">
          Poços Operacionais
        </div>

        <div style="
          font-size:38px;
          font-weight:700;
          color:var(--wg)
        ">
          ${data.operacionais_ok || 0}%
        </div>
      </div>

      <div style="
        background:var(--s);
        border:1px solid var(--bdl);
        border-radius:14px;
        padding:18px;
        box-shadow:var(--sh)
      ">
        <div style="font-size:11px;color:var(--t3)">
          Passivo Mapeado
        </div>

        <div style="
          font-size:28px;
          font-weight:700
        ">
          ${fmtBRL(data.passivo_total)}
        </div>
      </div>

      <div style="
        background:var(--s);
        border:1px solid var(--bdl);
        border-radius:14px;
        padding:18px;
        box-shadow:var(--sh)
      ">
        <div style="font-size:11px;color:var(--t3)">
          Ativos Sem Licença
        </div>

        <div style="
          font-size:38px;
          font-weight:700;
          color:var(--r)
        ">
          ${data.sem_licenca || 0}
        </div>
      </div>

    </div>

    <div style="
      background:var(--s);
      border:1px solid var(--bdl);
      border-radius:14px;
      padding:20px;
      box-shadow:var(--sh)
    ">

      <div style="
        font-size:13px;
        font-weight:600;
        margin-bottom:10px
      ">
        Resumo executivo
      </div>

      <div style="
        color:var(--t2);
        line-height:1.7
      ">
        ${data.resumo || "Sem resumo"}
      </div>

    </div>
  `;
}

/* CONDICIONANTES */

let condExpanded = new Set();

async function renderConditions(){

  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="loading">
      <span class="spin"></span>
      Carregando condicionantes
    </div>
  `;

  const data = await sf(`${API}/conditions/panel`);

  if(!data){
    app.innerHTML = `
      <div style="color:var(--r)">
        Erro ao carregar condicionantes
      </div>
    `;
    return;
  }

  const items = data.items || [];

  app.innerHTML = `

    <div style="margin-bottom:18px">
      <div style="font-size:26px;font-weight:700">
        Condicionantes
      </div>

      <div style="color:var(--t2)">
        Gestão operacional de atendimento
      </div>
    </div>

    <div id="cond-list"></div>
  `;

  renderCondCards(items);
}

function renderCondCards(items){

  const div = document.getElementById("cond-list");

  div.innerHTML = items.map(item=>{

    const expanded = condExpanded.has(item.id);

    return `
      <div style="
        background:var(--s);
        border:1px solid var(--bdl);
        border-radius:14px;
        margin-bottom:10px;
        overflow:hidden;
        box-shadow:var(--sh)
      ">

        <div
          onclick="toggleCond(${item.id})"
          style="
            padding:16px;
            cursor:pointer
          "
        >

          <div style="
            display:flex;
            justify-content:space-between;
            gap:10px
          ">

            <div>

              <div style="
                font-size:12px;
                color:var(--t3);
                margin-bottom:6px
              ">
                ${item.field || "—"}
              </div>

              <div style="
                font-size:14px;
                font-weight:600;
                line-height:1.6
              ">
                ${item.description || ""}
              </div>

            </div>

            <div style="
              color:var(--t3);
              font-size:12px
            ">
              ${expanded ? "▲" : "▼"}
            </div>

          </div>

        </div>

        ${
          expanded
          ? `
            <div style="
              border-top:1px solid var(--bdl);
              padding:16px;
              background:var(--bg)
            ">

              ${(item.assets || []).map(a=>`

                <div style="
                  display:flex;
                  align-items:center;
                  justify-content:space-between;
                  gap:10px;
                  padding:10px 0;
                  border-bottom:1px solid var(--bdl)
                ">

                  <div>
                    <div style="font-weight:600">
                      ${a.code || "—"}
                    </div>

                    <div style="
                      font-size:12px;
                      color:var(--t3)
                    ">
                      ${a.field || "—"}
                    </div>
                  </div>

                  ${
                    a.status==="completed"
                    ? `
                      <div style="
                        color:var(--p);
                        font-size:12px;
                        font-weight:600
                      ">
                        Concluído
                      </div>
                    `
                    : `
                      <button
                        onclick="event.stopPropagation();openBaixaModal(${item.id},${a.id})"
                        style="
                          border:none;
                          background:var(--p);
                          color:#fff;
                          padding:7px 14px;
                          border-radius:8px;
                          cursor:pointer;
                          font-weight:600
                        "
                      >
                        Dar baixa
                      </button>
                    `
                  }

                </div>

              `).join("")}

            </div>
          `
          : ""
        }

      </div>
    `;

  }).join("");
}

function toggleCond(id){

  if(condExpanded.has(id))
    condExpanded.delete(id);
  else
    condExpanded.add(id);

  renderConditions();
}

function openBaixaModal(condId,assetId){

  const ok = confirm(
    "Confirmar baixa desta condicionante?"
  );

  if(!ok) return;

  doBaixa(condId,assetId);
}

async function doBaixa(condId,assetId){

  const r = await sf(
    `${API}/conditions/${condId}/assets/${assetId}/complete`,
    {
      method:"PATCH",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        completed_by:"Sistema"
      })
    }
  );

  if(r && r.ok){
    alert("Baixa realizada");
    renderConditions();
  }else{
    alert("Erro ao dar baixa");
  }
}
/* ATIVOS */

let assetPage = 0;
let assetSearch = "";
let assetStatus = "";

async function renderAssets(){

  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="loading">
      <span class="spin"></span>
      Carregando ativos
    </div>
  `;

  const [summary, data] = await Promise.all([
    sf(`${API}/assets/summary`),
    sf(`${API}/assets/unified?limit=50&offset=${assetPage*50}&search=${encodeURIComponent(assetSearch)}&compliance_status=${encodeURIComponent(assetStatus)}`)
  ]);

  if(!data){
    app.innerHTML = `
      <div style="color:var(--r)">
        Erro ao carregar ativos
      </div>
    `;
    return;
  }

  const items = data.items || [];

  app.innerHTML = `

    <div style="margin-bottom:18px">
      <div style="font-size:26px;font-weight:700">
        Ativos
      </div>

      <div style="color:var(--t2)">
        Status regulatório dos ativos cadastrados
      </div>
    </div>

    <div style="
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:12px;
      margin-bottom:16px
    ">

      <div style="
        background:var(--s);
        border:1px solid var(--bdl);
        border-radius:14px;
        padding:16px;
        box-shadow:var(--sh)
      ">
        <div style="font-size:11px;color:var(--t3)">
          Total de ativos
        </div>

        <div style="font-size:30px;font-weight:700">
          ${summary?.total || data.total || 0}
        </div>
      </div>

      <div style="
        background:var(--s);
        border:1px solid var(--bdl);
        border-radius:14px;
        padding:16px;
        box-shadow:var(--sh)
      ">
        <div style="font-size:11px;color:var(--t3)">
          Produzindo
        </div>

        <div style="
          font-size:30px;
          font-weight:700;
          color:var(--p)
        ">
          ${summary?.producing || 0}
        </div>
      </div>

      <div style="
        background:var(--s);
        border:1px solid var(--bdl);
        border-radius:14px;
        padding:16px;
        box-shadow:var(--sh)
      ">
        <div style="font-size:11px;color:var(--t3)">
          Injetando
        </div>

        <div style="
          font-size:30px;
          font-weight:700;
          color:var(--b)
        ">
          ${summary?.injecting || 0}
        </div>
      </div>

      <div style="
        background:var(--s);
        border:1px solid var(--bdl);
        border-radius:14px;
        padding:16px;
        box-shadow:var(--sh)
      ">
        <div style="font-size:11px;color:var(--t3)">
          Sem licença
        </div>

        <div style="
          font-size:30px;
          font-weight:700;
          color:var(--r)
        ">
          ${summary?.missing || 0}
        </div>
      </div>

    </div>

    <div style="
      background:var(--s);
      border:1px solid var(--bdl);
      border-radius:14px;
      padding:12px;
      margin-bottom:14px;
      box-shadow:var(--sh);
      display:flex;
      gap:8px;
      flex-wrap:wrap
    ">

      <input
        id="assetSearch"
        placeholder="Buscar ativo ou campo..."
        value="${assetSearch}"
        style="
          flex:1;
          min-width:180px;
          border:1px solid var(--bdl);
          border-radius:8px;
          padding:8px 10px;
          font-family:inherit
        "
      >

      <select
        id="assetStatus"
        style="
          border:1px solid var(--bdl);
          border-radius:8px;
          padding:8px 10px;
          font-family:inherit
        "
      >
        <option value="">Todos os status</option>
        <option value="ok" ${assetStatus==="ok"?"selected":""}>Licença ativa</option>
        <option value="missing" ${assetStatus==="missing"?"selected":""}>Sem licença</option>
        <option value="expired" ${assetStatus==="expired"?"selected":""}>Licença vencida</option>
        <option value="upcoming" ${assetStatus==="upcoming"?"selected":""}>Próxima ao vencimento</option>
      </select>

      <button
        onclick="applyAssetFilter()"
        style="
          border:none;
          background:var(--p);

    expired:["Licença vencida","var(--r)","#fbeded"],

  };

  const [txt,col,bg] = map[status] || ["—","var(--t2)","var(--bdl)"];

  return `
    <span style="
      display:inline-flex;
      padding:3px 9px;
      border-radius:6px;
      background:${bg};
      color:${col};
      font-size:12px;
      font-weight:600

function applyAssetFilter(){

  assetSearch = document.getElementById("assetSearch").value || "";
  assetStatus = document.getElementById("assetStatus").value || "";
  assetPage = 0;

}

function prevAssetPage(){

  if(assetPage>0){
    assetPage--;
    renderAssets();
  }
}

function nextAssetPage(total){

  const maxPage = Math.ceil((total || 0)/50)-1;

  if(assetPage < maxPage){
    assetPage++;
    renderAssets();
  }
}

async function uploadDoc(type){

  const input = document.getElementById(
    type==="license" ? "pdfFile" : "billetFile"
  );

  const status = document.getElementById(
    type==="license" ? "upStatus" : "billetStatus"
  );

  const file = input.files[0];

  if(!file) return;

  status.innerHTML = `
    <div style="color:var(--t2)">
      Enviando e processando...
    </div>
  `;

  const fd = new FormData();
  fd.append("file",file);

  const r = await fetch(
    `${API}/licenses/upload?doc_type=${type}`,
    {
      method:"POST",
      body:fd
    }
  ).then(r=>r.json()).catch(()=>null);

  if(r && !r.error){
    status.innerHTML = `
      <div style="color:var(--p);font-weight:600">
        Upload concluído
      </div>
    `;

    loadDocs();
  }else{
    status.innerHTML = `
      <div style="color:var(--r)">
        Erro no upload
      </div>
    `;
  }
}

function getBudgetStore(){

  try{
    return JSON.parse(
      localStorage.getItem("envlicense_budget_v6") || "{}"
    );
  }catch(e){
    return {};
  }
}

function setBudgetStore(obj){

  localStorage.setItem(
    "envlicense_budget_v6",
    JSON.stringify(obj || {})
  );
}

function budgetForMonth(label){

  return Number(
    getBudgetStore()[String(label || "").trim()] || 0
  );
}

function renderScenarioCard(title,sc,color,rows,key){

  sc = sc || {};

  const max = Math.max(
    1,
    ...rows.map(r=>Number(r[key] || 0))
  );

  const bars = rows.map(r=>{

    const invest = Number(r[key] || 0);
    const residual = Number(r[`${key}_residual`] || 0);

    const h = invest > 0
      ? Math.max(5,Math.round(invest/max*62))
      : 3;

    return `
      <div style="flex:1;text-align:center">
        <div
          title="${r.year}: ${fmtBRL(invest)}"
          style="
            width:70%;
            margin:0 auto;
            height:${h}px;
            background:${invest>0 ? color : "var(--bdl)"};
            border-radius:5px 5px 0 0
          "
        ></div>

        <div style="
          font-size:9px;
          color:var(--t3);
          margin-top:4px
        ">
          ${invest>0 ? fmtBRL(invest) : residual<=0 ? "Zerado" : "—"}
        </div>

        <div style="
          font-size:9px;
          color:var(--t4)
        ">
          ${String(r.year).slice(2)}
        </div>
      </div>
    `;
  }).join("");

  return `
    <div style="
      border:1px solid var(--bdl);
      border-radius:14px;
      padding:16px;
      background:var(--bg)
    ">

      <div style="
        color:${color};
        font-size:11px;
        font-weight:700;
        text-transform:uppercase;
        margin-bottom:8px
      ">
        ${title}
      </div>

      <div style="
        display:grid;
        gap:8px;
        margin-bottom:12px
      ">

        <div style="
          background:#fff;
          border:1px solid var(--bdl);
          border-radius:10px;
          padding:10px
        ">
          <div style="font-size:10px;color:var(--t3)">
            Investimento total
          </div>

          <div style="font-weight:700">
            ${fmtBRL(sc.investment)}
          </div>
        </div>

        <div style="
          background:#fff;
          border:1px solid var(--bdl);
          border-radius:10px;
          padding:10px
        ">
          <div style="font-size:10px;color:var(--t3)">
            Passivo residual
          </div>

          <div style="
            font-weight:700;
            color:${Number(sc.final_passive || 0)>0 ? "var(--r)" : "var(--p)"}
          ">
            ${fmtBRL(sc.final_passive)}
          </div>
        </div>

        <div style="
          background:#fff;
          border:1px solid var(--bdl);
          border-radius:10px;
          padding:10px
        ">
          <div style="font-size:10px;color:var(--t3)">
            Conclusão
          </div>

          <div style="font-weight:700">
            ${sc.completion_year || "Não zera"}
          </div>
        </div>

      </div>

      <div style="
        display:flex;
        align-items:flex-end;
        gap:4px;
        height:86px
      ">
        ${bars}
      </div>
    </div>
  `;
}

function openBudgetModal(months){

  const b = getBudgetStore();

  const rows = (months || []).map(m=>{

    const key = String(m.label || "").trim();

    return `
      <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:10px;
        padding:8px 0;
        border-bottom:1px solid var(--bdl)
      ">
        <span>${m.label}</span>

        <input
          data-budget-key="${key}"
          value="${b[key] || 0}"
          type="number"
          style="
            border:1px solid var(--bdl);
            border-radius:8px;
            padding:6px 8px;
            width:120px;
            text-align:right
          "
        >
      </div>
    `;
  }).join("");

  const html = `
    <div style="padding:22px">

      <div style="
        font-size:18px;
        font-weight:700;
        margin-bottom:6px
      ">
        Budget mensal
      </div>

      <div style="
        color:var(--t2);
        font-size:13px;
        margin-bottom:16px
      ">
        Informe o budget planejado por mês.
      </div>

      <div>${rows}</div>

      <div style="
        display:flex;
        justify-content:flex-end;
        gap:8px;
        margin-top:18px
      ">
        <button onclick="closeMod()">Cancelar</button>
        <button onclick="saveBudgetModal()">Salvar</button>
      </div>
    </div>
  `;

  openMod(html);
}

function saveBudgetModal(){

  const obj = getBudgetStore();

  document.querySelectorAll("[data-budget-key]")
    .forEach(inp=>{
      obj[inp.dataset.budgetKey] = Number(inp.value) || 0;
    });

  setBudgetStore(obj);

  closeMod();
  renderPlanning();
}

function openMod(html){

  let modal = document.getElementById("modal");

  if(!modal){

    modal = document.createElement("div");
    modal.id = "modal";

    modal.style.position = "fixed";
    modal.style.inset = "0";
    modal.style.background = "rgba(0,0,0,.35)";
    modal.style.display = "flex";
    modal.style.alignItems = "center";
    modal.style.justifyContent = "center";
    modal.style.zIndex = "999";

    document.body.appendChild(modal);
  }

  modal.innerHTML = `
    <div style="
      background:#fff;
      border-radius:14px;
      max-width:480px;
      width:92%;
      box-shadow:var(--shl)
    ">
      ${html}
    </div>
  `;

  modal.onclick = e=>{
    if(e.target===modal) closeMod();
  };
}

function closeMod(){

  const modal = document.getElementById("modal");

  if(modal) modal.remove();
}

setTab("dashboard");
</script>
</body>
</html>
