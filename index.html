let passiveDissolutionYears = 5;
let selectedLiabilityType = "all";

function getBudgetStore() { try { return JSON.parse(localStorage.getItem("envlicense_budget_v6") || "{}"); } catch(e) { return {}; } }
function setBudgetStore(obj) { localStorage.setItem("envlicense_budget_v6", JSON.stringify(obj || {})); }
function budgetForMonth(label) { return Number(getBudgetStore()[String(label || "").trim()] || 0); }

function num(v) { const n = Number(v); return Number.isFinite(n) ? n : 0; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

async function renderPlanning() {
  const app = document.getElementById("app");
  app.innerHTML = '<div class="loading"><span class="spin"></span> Carregando visão financeira…</div>';

  const [finSum, byMonth, byField, byCat, strategic] = await Promise.all([
    sf(`${API}/financial/summary`),
    sf(`${API}/financial/by_month`),
    sf(`${API}/financial/by_field`),
    sf(`${API}/financial/by_category`),
    sf(`${API}/financial/strategic-projection?years=${passiveDissolutionYears}`)
  ]);

  const fs = finSum || {};
  const months = (byMonth || []).slice(-12);
  window.__planningMonths = months;
  const fields = byField || [];
  const cats = byCat || [];
  const strat = strategic || {};

  const totalRealizado = num(fs.total_realizado);
  const totalProvisionado = num(fs.total_provisionado);
  const totalRequired = num(strat.summary?.total_required);
  const operationalRequired = num(strat.summary?.operational_required);
  const annualCap = num(strat.annual_execution_capacity);

  // Budget mensal
  const budgetTotal = months.reduce((s, m) => s + budgetForMonth(m.label), 0);
  const budgetBalance = budgetTotal - totalRealizado;
  const balanceColor = budgetTotal <= 0 ? "var(--t3)" : budgetBalance >= 0 ? "var(--p)" : "var(--r)";

  // Scenarios
  const scenarios = strat.scenarios || {};
  const sc_curr = scenarios.current || {};
  const sc_op = scenarios.operational || {};
  const sc_exc = scenarios.excellence || {};
  const annComp = strat.annual_comparison || [];

  // Chart: monthly realized vs budget
  const maxMonth = Math.max(1, ...months.map(m => Math.max(m.realizado || 0, budgetForMonth(m.label))));
  const monthBars = months.map(m => {
    const real = m.realizado || 0;
    const budget = budgetForMonth(m.label);
    const rH = Math.max(2, Math.round(real / maxMonth * 120));
    const bH = Math.max(2, Math.round(budget / maxMonth * 120));
    const over = real > budget && budget > 0;
    return `<div style="flex:1;min-width:0;text-align:center">
      <div style="height:124px;display:flex;align-items:flex-end;justify-content:center;position:relative;gap:2px">
        ${budget > 0 ? `<div title="Budget: ${fmtBRLFull(budget)}" style="width:40%;height:${bH}px;background:var(--bt);border:1.5px dashed var(--b);border-radius:4px 4px 0 0;box-sizing:border-box"></div>` : ''}
        <div title="Realizado: ${fmtBRLFull(real)}" style="width:40%;height:${rH}px;background:${over ? 'var(--r)' : 'var(--p)'};border-radius:4px 4px 0 0;opacity:.9"></div>
      </div>
      <div style="font-size:9px;color:var(--t4);margin-top:5px;white-space:nowrap;overflow:hidden">${m.label}</div>
    </div>`;
  }).join('');

  // Chart: annual comparison (stacked by scenario)
  const maxAnn = Math.max(1, ...annComp.map(r => Math.max(r.excellence || 0, r.due_amount || 0)));
  const annBars = annComp.map(r => {
    const excH = Math.max(2, Math.round(num(r.excellence) / maxAnn * 100));
    const opH = Math.max(2, Math.round(num(r.operational) / maxAnn * 100));
    const curH = Math.max(2, Math.round(num(r.current) / maxAnn * 100));
    return `<div style="flex:1;min-width:0;text-align:center">
      <div style="height:104px;display:flex;align-items:flex-end;justify-content:center;gap:2px">
        <div title="Atual: ${fmtBRL(r.current)}" style="width:28%;height:${curH}px;background:var(--b);border-radius:3px 3px 0 0;opacity:.8"></div>
        <div title="Operacional: ${fmtBRL(r.operational)}" style="width:28%;height:${opH}px;background:var(--wg);border-radius:3px 3px 0 0;opacity:.85"></div>
        <div title="Excelência: ${fmtBRL(r.excellence)}" style="width:28%;height:${excH}px;background:var(--p);border-radius:3px 3px 0 0;opacity:.9"></div>
      </div>
      <div style="font-size:9px;color:var(--t4);margin-top:5px">${String(r.year).slice(2)}</div>
    </div>`;
  }).join('');

  // Field bars
  const maxField = Math.max(1, ...fields.map(f => num(f.total)));
  const fieldBarsHTML = fields.slice(0, 8).map(f => `
    <li class="bitem">
      <span class="blbl" title="${f.field || ''}">${String(f.field || '').slice(0, 16)}</span>
      <span class="btrack"><span class="bfill" style="width:${Math.round(num(f.total)/maxField*100)}%;background:var(--p)"></span></span>
      <span class="bval">${fmtBRL(f.total)}</span>
    </li>`).join('') || '<div class="empty">Sem dados por campo</div>';

  // Category bars
  const catColors = { monitoring:"#1a56db", effluent:"#34a853", reporting:"#00722A", infrastructure:"#f59e0b", other:"#94a3b8" };
  const maxCat = Math.max(1, ...cats.map(c => num(c.estimado)));
  const catBarsHTML = cats.map(c => `
    <li class="bitem">
      <span class="blbl">${c.label || c.category}</span>
      <span class="btrack"><span class="bfill" style="width:${Math.round(num(c.estimado)/maxCat*100)}%;background:${catColors[c.category] || '#94a3b8'}"></span></span>
      <span class="bval">${fmtBRL(c.estimado)}</span>
    </li>`).join('') || '<div class="empty">Sem dados</div>';

  // Dissolution selector
  const dissControls = [1,2,3,4,5].map(y => `
    <button class="btn btn-sm ${passiveDissolutionYears === y ? '' : 'btn-g'}" onclick="passiveDissolutionYears=${y};renderPlanning()">
      ${y} ano${y > 1 ? 's' : ''}
    </button>`).join('');

  // Scenario risk color
  const riskCol = lv => lv === 'green' ? 'var(--p)' : lv === 'yellow' ? 'var(--w)' : 'var(--r)';
  const riskLabel = lv => lv === 'green' ? 'Baixo risco' : lv === 'yellow' ? 'Atenção' : 'Elevado';

  // Projection rows for scenario bars
  const projRows = strat.scenario_rows || {};
  const buildScBar = (key, color) => {
    const rows = (projRows[key] || []).slice(0, passiveDissolutionYears);
    if (!rows.length) return '<div class="empty" style="padding:12px">Sem dados de projeção</div>';
    const mx = Math.max(1, ...rows.map(r => num(r.annual_investment)));
    return `<div style="display:flex;align-items:flex-end;gap:4px;height:72px;margin-top:12px">
      ${rows.map(r => {
        const h = Math.max(4, Math.round(num(r.annual_investment)/mx*60));
        const zeroed = num(r.residual_passive) <= 0;
        return `<div style="flex:1;text-align:center" title="${r.year}: ${fmtBRLFull(r.annual_investment)} investido | residual: ${fmtBRLFull(r.residual_passive)}">
          <div style="height:${h}px;background:${zeroed?'var(--pl)':color};border-radius:4px 4px 0 0;opacity:.85;margin:0 auto;width:80%"></div>
          <div style="font-size:9px;color:var(--t4);margin-top:4px">${String(r.year).slice(2)}</div>
        </div>`;
      }).join('')}
    </div>`;
  };

  app.innerHTML = `
    <div class="ph">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div><h1>Gestão financeira regulatória</h1><p class="sub">Passivo mapeado, projeção de dissolução e cenários de investimento</p></div>
        <button class="btn btn-g btn-sm" onclick="openParamsModal()">
          <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
          Parâmetros financeiros
        </button>
      </div>
    </div>

    <!-- KPIs FINANCEIROS -->
    <div class="kpis">
      <div class="kpi accent-green">
        <div class="kl">Realizado</div>
        <div class="kv" style="font-size:20px">${fmtBRL(totalRealizado)}</div>
        <div class="ks">Executado no período</div>
      </div>
      <div class="kpi ${budgetTotal > 0 ? (budgetBalance >= 0 ? 'accent-green' : 'accent-red') : ''}">
        <div class="kl">Saldo vs budget</div>
        <div class="kv" style="font-size:20px;color:${balanceColor}">${budgetTotal > 0 ? fmtBRL(budgetBalance) : '—'}</div>
        <div class="ks">${budgetTotal > 0 ? (budgetBalance >= 0 ? 'Dentro do budget' : 'Acima do budget') : 'Informe o budget mensal'}</div>
      </div>
      <div class="kpi accent-amber">
        <div class="kl">Passivo mapeado</div>
        <div class="kv" style="font-size:20px">${fmtBRL(totalRequired > 0 ? totalRequired : totalProvisionado)}</div>
        <div class="ks">Base da simulação</div>
      </div>
      <div class="kpi ${operationalRequired > 0 ? 'accent-red' : ''}">
        <div class="kl">Passivo operacional</div>
        <div class="kv" style="font-size:20px;color:${operationalRequired > 0 ? 'var(--r)' : 'var(--t3)'}">${fmtBRL(operationalRequired)}</div>
        <div class="ks">Vinculado a poços ativos</div>
      </div>
      <div class="kpi">
        <div class="kl">Cap. anual histórica</div>
        <div class="kv" style="font-size:20px">${annualCap > 0 ? fmtBRL(annualCap) : '—'}</div>
        <div class="ks">${annualCap > 0 ? 'Média dos últimos 24 meses' : 'Sem histórico suficiente'}</div>
      </div>
    </div>

    <!-- CURVA MENSAL -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div class="ct" style="margin-bottom:0">Curva financeira mensal — realizado vs budget</div>
        <button class="btn btn-g btn-xs" onclick="openBudgetModal(window.__planningMonths || [])">+ Budget</button>
      </div>
      <div style="font-size:12px;color:var(--t3);margin-bottom:14px">Últimos 12 meses. Barra azul = budget planejado, verde/vermelha = realizado.</div>
      ${months.length ? `<div style="display:flex;align-items:flex-end;gap:4px;height:128px">${monthBars}</div>
        <div class="fin-legend">
          <div class="fin-leg-item"><div class="fin-leg-dot" style="background:var(--p)"></div>Realizado (dentro)</div>
          <div class="fin-leg-item"><div class="fin-leg-dot" style="background:var(--r)"></div>Realizado (acima)</div>
          <div class="fin-leg-item"><div class="fin-leg-dot" style="background:var(--bt);border:1.5px dashed var(--b)"></div>Budget</div>
        </div>` : '<div class="empty">Sem dados mensais</div>'}
    </div>

    <!-- CUSTO POR CAMPO / CATEGORIA -->
    <div class="g2">
      <div class="card"><div class="ct">Custo por campo</div><ul class="blist">${fieldBarsHTML}</ul></div>
      <div class="card"><div class="ct">Custo por categoria</div><ul class="blist">${catBarsHTML}</ul></div>
    </div>

    <!-- SIMULADOR -->
    <div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px">
        <div>
          <div class="ct" style="margin-bottom:4px">Simulador de dissolução do passivo</div>
          <div style="font-size:12.5px;color:var(--t2)">Selecione o horizonte de planejamento para comparar os cenários de investimento.</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${dissControls}</div>
      </div>

      ${annComp.length ? `
      <div class="card" style="background:var(--bg);border-color:var(--bdl);margin-bottom:14px">
        <div class="ct">Investimento anual comparado — cenários</div>
        <div style="display:flex;align-items:flex-end;gap:4px;height:108px">${annBars}</div>
        <div class="fin-legend" style="margin-top:10px">
          <div class="fin-leg-item"><div class="fin-leg-dot" style="background:var(--b)"></div>Cenário atual</div>
          <div class="fin-leg-item"><div class="fin-leg-dot" style="background:var(--wg)"></div>Continuidade operacional</div>
          <div class="fin-leg-item"><div class="fin-leg-dot" style="background:var(--p)"></div>Excelência operacional</div>
        </div>
      </div>` : ''}

      <div class="g3" style="margin-bottom:0">

        <!-- CENÁRIO ATUAL -->
        <div class="sc-card">
          <div class="sc-tag" style="color:var(--b)">Cenário atual</div>
          <div class="sc-name">Trajetória atual</div>
          <div class="sc-desc">Mantém o ritmo histórico de execução. Passivo residual acumula se capacidade for insuficiente.</div>
          ${annualCap > 0 ? `
          <div class="sc-metric"><div class="sc-metric-lbl">Investimento total (${passiveDissolutionYears}a)</div><div class="sc-metric-val">${fmtBRL(sc_curr.investment)}</div></div>
          <div class="sc-metric"><div class="sc-metric-lbl">Passivo residual final</div><div class="sc-metric-val" style="color:${num(sc_curr.final_passive) > 0 ? 'var(--r)' : 'var(--p)'}">${fmtBRL(sc_curr.final_passive)}</div></div>
          <div class="sc-metric"><div class="sc-metric-lbl">Conformidade estimada</div><div class="sc-metric-val" style="color:${riskCol(sc_curr.risk_level)}">${sc_curr.target_compliance || 0}% · ${riskLabel(sc_curr.risk_level)}</div></div>
          ${buildScBar('current', 'var(--b)')}` : `<div class="wmsg" style="margin-top:8px">Sem histórico de execução suficiente para projeção.</div>`}
        </div>

        <!-- CONTINUIDADE OPERACIONAL -->
        <div class="sc-card">
          <div class="sc-tag" style="color:var(--wg)">Continuidade operacional</div>
          <div class="sc-name">Operação protegida</div>
          <div class="sc-desc">Prioriza 100% das obrigações de poços em produção e injeção. Garante continuidade regulatória da operação.</div>
          ${operationalRequired > 0 ? `
          <div class="sc-metric"><div class="sc-metric-lbl">Investimento total (${passiveDissolutionYears}a)</div><div class="sc-metric-val">${fmtBRL(sc_op.investment)}</div></div>
          <div class="sc-metric"><div class="sc-metric-lbl">Passivo operacional residual</div><div class="sc-metric-val" style="color:${num(sc_op.final_passive) > 0 ? 'var(--r)' : 'var(--p)'}">${fmtBRL(sc_op.final_passive)}</div></div>
          <div class="sc-metric"><div class="sc-metric-lbl">Incremento vs cenário atual</div><div class="sc-metric-val">${fmtBRL(sc_op.incremental)}</div></div>
          ${buildScBar('operational', 'var(--wg)')}` : `<div class="omsg" style="margin-top:8px">Nenhum passivo operacional identificado. Operação regularizada.</div>`}
        </div>

        <!-- EXCELÊNCIA OPERACIONAL -->
        <div class="sc-card">
          <div class="sc-tag" style="color:var(--p)">Excelência operacional</div>
          <div class="sc-name">Passivo zerado</div>
          <div class="sc-desc">Elimina 100% do passivo mapeado no horizonte selecionado. Menor risco regulatório futuro.</div>
          ${totalRequired > 0 || totalProvisionado > 0 ? `
          <div class="sc-metric"><div class="sc-metric-lbl">Investimento total (${passiveDissolutionYears}a)</div><div class="sc-metric-val">${fmtBRL(sc_exc.investment)}</div></div>
          <div class="sc-metric"><div class="sc-metric-lbl">Passivo residual final</div><div class="sc-metric-val" style="color:var(--p)">R$ 0</div></div>
          <div class="sc-metric"><div class="sc-metric-lbl">Incremento vs cenário atual</div><div class="sc-metric-val">${fmtBRL(sc_exc.incremental)}</div></div>
          ${buildScBar('excellence', 'var(--p)')}` : `<div class="wmsg" style="margin-top:8px">Dados insuficientes para projeção real de excelência.</div>`}
        </div>

      </div>
      <div style="font-size:11px;color:var(--t3);margin-top:12px">
        * Simulação baseada no passivo atualmente mapeado. Não considera multas, deterioração, novos vencimentos ou peso por ativo. Capacidade anual = média dos últimos 24 meses de execução.
      </div>
    </div>`;
}

function openBudgetModal(months) {
  const b = getBudgetStore();
  const rows = months.map(m => {
    const k = String(m.label || "").trim();
    const sid = k.replace(/[^a-zA-Z0-9]/g, "_");
    return `<div class="cref-row"><span class="cref-lbl">${m.label || "Mês"}</span><input class="cref-inp" type="number" data-budget-key="${k}" id="bgt-${sid}" value="${b[k] || 0}" placeholder="R$"></div>`;
  }).join('');
  openMod(`
    <div class="mhead">
      <div class="mic" style="background:var(--pt);color:var(--p)"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
      <div class="mttl">Budget mensal</div>
      <div class="msub">Informe o budget planejado por mês para comparação com o realizado.</div>
    </div>
    <div class="mbody"><div class="minfo" style="max-height:320px;overflow-y:auto">${rows || '<div class="empty">Sem meses disponíveis</div>'}</div></div>
    <div class="mact">
      <button class="btn btn-g" onclick="closeMod()">Cancelar</button>
      <button class="btn" onclick="saveBudgetModal()">Salvar budget</button>
    </div>`);
}

function saveBudgetModal() {
  const obj = getBudgetStore();
  document.querySelectorAll("[data-budget-key]").forEach(inp => { obj[inp.dataset.budgetKey] = Number(inp.value) || 0; });
  setBudgetStore(obj);
  closeMod();
  showToast("✓ Budget mensal salvo");
  renderPlanning();
}

// PARÂMETROS FINANCEIROS (valores de referência movidos da Central Documental)
async function openParamsModal() {
  const costRef = await sf(`${API}/cost-reference`) || { licenses:[], conditions:[] };
  const licRows = (costRef.licenses || []).map(r => `
    <div class="cref-row">
      <span class="cref-lbl">${r.type}</span>
      <input class="cref-inp" type="number" id="lic-${r.type}" value="${r.acquisition || 0}" placeholder="Aquisição R$">
      <button class="cref-save" onclick="saveLicCost('${r.type}')">✓</button>
    </div>`).join('');
  const condRows = (costRef.conditions || []).map(r => `
    <div class="cref-row">
      <span class="cref-lbl">${r.label}</span>
      <input class="cref-inp" type="number" id="cond-${r.category}" value="${r.avg_cost || 0}" placeholder="Custo médio R$">
      <button class="cref-save" onclick="saveCondCost('${r.category}')">✓</button>
    </div>`).join('');
  openMod(`
    <div class="mhead">
      <div class="mic" style="background:var(--pt);color:var(--p)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg></div>
      <div class="mttl">Parâmetros financeiros</div>
      <div class="msub">Valores históricos de referência usados nos simuladores. Edite e salve cada linha.</div>
    </div>
    <div class="mbody">
      <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin:10px 0 6px">Por tipo de licença</div>
      <div class="minfo" style="padding:8px 12px">${licRows || '<div class="empty" style="padding:8px">Sem referências cadastradas</div>'}</div>
      <div style="font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin:12px 0 6px">Por categoria de condicionante</div>
      <div class="minfo" style="padding:8px 12px">${condRows || '<div class="empty" style="padding:8px">Sem referências cadastradas</div>'}</div>
    </div>
    <div class="mact"><button class="btn btn-g" onclick="closeMod()">Fechar</button></div>`);
}

async function saveLicCost(type) {
  const acq = parseFloat(document.getElementById(`lic-${type}`)?.value) || 0;
  const r = await fetch(`${API}/cost-reference/license/${type}`, { method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ acquisition:acq, renewal:acq*0.5, notes:"" }) }).then(r => r.json()).catch(() => ({}));
  if (r.ok) showToast(`✓ ${type} salvo`);
}
async function saveCondCost(cat) {
  const avg = parseFloat(document.getElementById(`cond-${cat}`)?.value) || 0;
  const r = await fetch(`${API}/cost-reference/condition/${cat}`, { method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ avg_cost:avg, notes:"" }) }).then(r => r.json()).catch(() => ({}));
  if (r.ok) showToast(`✓ ${cat} salvo`);
}

// ── INIT ──
show("dashboard");
</script>
</body>
</html>
