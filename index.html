<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EnvLicense | PetroRecôncavo</title>

<style>
:root{
  --p:#007023;
  --ph:#005a1c;
  --pl:#4EA72E;
  --pt:#e8f5ec;

  --wg:#8FBF21;

  --w:#F9CE29;
  --wt:#7a5e00;

  --r:#9D2928;
  --rh:#7a1f1e;
  --rt:#fbeded;

  --b:#125E81;
  --bt:#deeef5;

  --t1:#1d1d1f;
  --t2:#6e6e73;
  --t3:#86868b;
  --t4:#aeaeb2;

  --bd:#d2d2d7;
  --bdl:#f0f0f5;

  --bg:#f5f5f7;
  --s:#fff;

  --rad:14px;
  --rads:9px;

  --ease:cubic-bezier(.4,0,.2,1);

  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
  --shl:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.07);

  --sw:60px;
  --se:228px;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  height:100%;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
  background:var(--bg);
  color:var(--t1);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  display:flex;
  overflow:hidden;
}

/* ============================================================
   SIDEBAR
============================================================ */

.sb{
  width:var(--sw);
  background:var(--s);
  border-right:1px solid var(--bdl);
  display:flex;
  flex-direction:column;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  z-index:100;
  overflow:hidden;
  transition:width .22s var(--ease);
}

.sb:hover{
  width:var(--se);
}

.sb-brand{
  display:flex;
  align-items:center;
  gap:11px;
  padding:16px 14px;
  border-bottom:1px solid var(--bdl);
  min-height:60px;
  white-space:nowrap;
  overflow:hidden;
}

.sb-mark{
  width:30px;
  height:30px;
  min-width:30px;
  background:linear-gradient(135deg,var(--p),var(--pl));
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:800;
  font-size:12px;
  letter-spacing:.02em;
}

.sb-txt{
  opacity:0;
  transform:translateX(-8px);
  transition:all .18s var(--ease);
}

.sb:hover .sb-txt{
  opacity:1;
  transform:none;
}

.sb-name{
  font-size:14px;
  font-weight:700;
  letter-spacing:-.03em;
}

.sb-sub{
  font-size:10.5px;
  color:var(--t3);
}

.sb-sec{
  padding:8px 0;
}

.sb-lbl{
  font-size:9px;
  color:var(--t4);
  text-transform:uppercase;
  letter-spacing:.09em;
  font-weight:800;
  padding:7px 16px 4px;
  opacity:0;
  transition:opacity .18s var(--ease);
}

.sb:hover .sb-lbl{
  opacity:1;
}

.nb{
  width:100%;
  background:transparent;
  border:none;
  padding:8px 15px;
  cursor:pointer;
  font-family:inherit;
  display:flex;
  align-items:center;
  gap:12px;
  color:var(--t2);
  transition:all .13s var(--ease);
  min-height:40px;
  overflow:hidden;
  white-space:nowrap;
}

.nb:hover{
  background:var(--bdl);
  color:var(--t1);
}

.nb.on{
  background:var(--pt);
  color:var(--p);
}

.nb-ic{
  width:20px;
  height:20px;
  min-width:20px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.nb-ic svg{
  width:16px;
  height:16px;
  stroke:currentColor;
  stroke-width:1.9;
  fill:none;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.nb-lbl{
  font-size:13px;
  font-weight:600;
  opacity:0;
  transform:translateX(-5px);
  transition:all .18s var(--ease);
}

.sb:hover .nb-lbl{
  opacity:1;
  transform:none;
}

.sb-foot{
  margin-top:auto;
  padding:12px 15px;
  border-top:1px solid var(--bdl);
  display:flex;
  align-items:center;
  gap:8px;
}

.sb-ver{
  width:30px;
  height:30px;
  min-width:30px;
  background:var(--bdl);
  border-radius:7px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:9px;
  font-weight:800;
  color:var(--t3);
}

.sb-ft{
  font-size:10.5px;
  color:var(--t4);
  opacity:0;
  transition:opacity .18s var(--ease);
  white-space:nowrap;
}

.sb:hover .sb-ft{
  opacity:1;
}

/* ============================================================
   MAIN
============================================================ */

.main-wrap{
  margin-left:var(--sw);
  flex:1;
  height:100vh;
  overflow-y:auto;
  overflow-x:hidden;
  transition:margin-left .22s var(--ease);
  display:flex;
  flex-direction:column;
}

.sb:hover~.main-wrap{
  margin-left:var(--se);
}

.topbar{
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bdl);
  padding:0 28px;
  height:56px;
  display:flex;
  align-items:center;
  gap:14px;
  position:sticky;
  top:0;
  z-index:50;
  flex-shrink:0;
}

.tb-ttl{
  font-size:15px;
  font-weight:700;
  letter-spacing:-.025em;
  flex:1;
}

.search-btn{
  border:1px solid var(--bdl);
  background:var(--bg);
  color:var(--t2);
  border-radius:10px;
  padding:7px 12px;
  font-size:12.5px;
  display:flex;
  gap:7px;
  align-items:center;
  cursor:pointer;
  min-width:250px;
}

.search-btn svg{
  width:14px;
  height:14px;
  stroke:currentColor;
  stroke-width:2;
  fill:none;
}

.cnt{
  padding:26px 30px 88px;
  flex:1;
}

/* ============================================================
   COMPONENTES
============================================================ */

.ph{
  margin-bottom:18px;
}

.ph h1{
  font-size:26px;
  font-weight:800;
  letter-spacing:-.04em;
  margin-bottom:3px;
}

.ph p{
  color:var(--t2);
  font-size:13px;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:12px;
  margin-bottom:14px;
}

.kpi{
  background:var(--s);
  border:1px solid var(--bdl);
  border-radius:var(--rad);
  padding:17px 18px;
  box-shadow:var(--sh);
  position:relative;
  overflow:hidden;
}

.kpi:before{
  content:"";
  position:absolute;
  inset:0 0 auto 0;
  height:3px;
  background:var(--bdl);
}

.kpi.green:before{background:linear-gradient(90deg,var(--p),var(--pl));}
.kpi.red:before{background:var(--r);}
.kpi.amber:before{background:var(--w);}
.kpi.blue:before{background:var(--b);}

.kl{
  font-size:10px;
  color:var(--t3);
  text-transform:uppercase;
  letter-spacing:.07em;
  font-weight:800;
  margin-bottom:7px;
}

.kv{
  font-size:28px;
  line-height:1;
  font-weight:800;
  letter-spacing:-.04em;
}

.ks{
  font-size:11.5px;
  color:var(--t3);
  margin-top:6px;
}

.card{
  background:var(--s);
  border:1px solid var(--bdl);
  border-radius:var(--rad);
  padding:18px;
  box-shadow:var(--sh);
  margin-bottom:14px;
}

.ct{
  font-size:10px;
  color:var(--t3);
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.07em;
  margin-bottom:14px;
}

.g2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:14px;
}

.g3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:14px;
  margin-bottom:14px;
}

@media(max-width:1100px){
  .g2,.g3{
    grid-template-columns:1fr;
  }
}

.btn{
  border:none;
  background:var(--p);
  color:#fff;
  padding:7px 14px;
  border-radius:9px;
  cursor:pointer;
  font-family:inherit;
  font-size:13px;
  font-weight:700;
  display:inline-flex;
  align-items:center;
  gap:6px;
  transition:all .12s var(--ease);
}

.btn:hover{
  background:var(--ph);
}

.btn-g{
  background:#fff;
  color:var(--t2);
  border:1px solid var(--bd);
}

.btn-g:hover{
  background:var(--bdl);
  color:var(--t1);
}

.btn-r{
  background:var(--r);
}

.btn-r:hover{
  background:var(--rh);
}

.btn-sm{
  padding:5px 11px;
  font-size:12px;
}

.btn-xs{
  padding:3px 9px;
  font-size:11px;
}

.inp,.sel{
  border:1px solid var(--bdl);
  background:var(--bg);
  border-radius:9px;
  padding:7px 10px;
  font-family:inherit;
  font-size:13px;
  outline:none;
}

.inp:focus,.sel:focus{
  border-color:var(--p);
  box-shadow:0 0 0 3px rgba(0,112,35,.08);
}

.toolbar{
  background:var(--s);
  border:1px solid var(--bdl);
  border-radius:var(--rad);
  padding:10px 12px;
  margin-bottom:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
  box-shadow:var(--sh);
}

.badge{
  display:inline-flex;
  align-items:center;
  padding:3px 9px;
  border-radius:6px;
  font-size:11.5px;
  font-weight:700;
  white-space:nowrap;
}

.b-ok{background:#e8f5ec;color:#1f5f33;}
.b-up{background:#fff7d6;color:var(--wt);}
.b-ex{background:var(--rt);color:var(--r);}
.b-mi{background:#f5dede;color:#7a1f1e;}
.b-pe{background:var(--bt);color:var(--b);}
.b-dn{background:#e8f5ec;color:#1f5f33;}

.loading{
  padding:42px;
  color:var(--t3);
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  text-align:center;
}

.spin{
  width:16px;
  height:16px;
  border:2px solid var(--bdl);
  border-top-color:var(--p);
  border-radius:50%;
  animation:spin .65s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.empty{
  padding:32px;
  text-align:center;
  color:var(--t3);
  font-size:13px;
}

.emsg{
  background:var(--rt);
  color:var(--r);
  padding:10px 12px;
  border-radius:9px;
  border:1px solid #f3b9b9;
  margin:8px 0;
  font-size:13px;
}

.omsg{
  background:var(--pt);
  color:#1f5f33;
  padding:10px 12px;
  border-radius:9px;
  border:1px solid #c7e7d0;
  margin:8px 0;
  font-size:13px;
}

.tw{
  border:1px solid var(--bdl);
  border-radius:var(--rad);
  overflow:auto;
  background:#fff;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;
  padding:11px 13px;
  font-size:10px;
  color:var(--t3);
  text-transform:uppercase;
  letter-spacing:.07em;
  background:var(--bg);
  border-bottom:1px solid var(--bdl);
}

td{
  padding:11px 13px;
  border-bottom:1px solid var(--bdl);
  font-size:12.5px;
}

tr:last-child td{
  border-bottom:none;
}

tr:hover td{
  background:rgba(0,112,35,.018);
}
</style>
</head>

<body>

<aside class="sb" id="sb">

<div id="modalRoot"></div>

<script>
const API = "https://envlicense-backend.onrender.com";

let currentTab = "dashboard";
let assetPage = 0;
let assetSearch = "";
let assetStatus = "";
let assetField = "";
let assetSituation = "";

let condFilter = "all";
let condField = "";
let condAgency = "";
let condExpanded = new Set();

let passiveYears = 5;
let planningOnly = "all";

const TABS = {
  dashboard:"Visão executiva",
  docs:"Central documental",
  assets:"Ativos",
  conditions:"Condicionantes",
  planning:"Gestão financeira"
};

const CAT_COLOR = {
  monitoring:"#125E81",
  effluent:"#4EA72E",
  reporting:"#007023",
  infrastructure:"#F9CE29",
  other:"#86868b"
};

const CAT_NAME = {
  monitoring:"Monitoramento",
  effluent:"Efluentes",
  reporting:"Relatórios",
  infrastructure:"Infraestrutura",
  other:"Outros"
};

/* ============================================================
   UTILS
============================================================ */

async function sf(url, opts = {}) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), opts.timeout || 25000);

  try {
    const res = await fetch(url, {
      ...opts,
      signal: ctrl.signal
    });

    clearTimeout(timer);

    const txt = await res.text();

    let data = null;

    try {
      data = txt ? JSON.parse(txt) : null;
    } catch (e) {
      console.error("Resposta não JSON:", url, txt);
      return null;
    }

    if (!res.ok) {
      console.error("Erro API:", res.status, url, data);
      return null;
    }

    return data;

  } catch (e) {
    clearTimeout(timer);
    console.error("Falha fetch:", url, e.message);
    return null;
  }
}

function fmtBRL(v) {
  const n = Number(v || 0);

  if (n >= 1000000000) return "R$ " + (n/1000000000).toFixed(1) + "B";
  if (n >= 1000000) return "R$ " + (n/1000000).toFixed(1) + "M";
  if (n >= 1000) return "R$ " + (n/1000).toFixed(0) + "k";

  return "R$ " + n.toLocaleString("pt-BR", {
    minimumFractionDigits:0,
    maximumFractionDigits:0
  });
}

function fmtBRLFull(v) {
  return "R$ " + Number(v || 0).toLocaleString("pt-BR", {
    minimumFractionDigits:0,
    maximumFractionDigits:0
  });
}

function pct(v) {
  return Math.round(Number(v || 0)) + "%";
}

function escapeHtml(str) {
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function showToast(msg) {
  const t = document.createElement("div");

  t.textContent = msg;

  t.style.position = "fixed";
  t.style.bottom = "24px";
  t.style.right = "24px";
  t.style.background = "var(--t1)";
  t.style.color = "#fff";
  t.style.padding = "12px 18px";
  t.style.borderRadius = "12px";
  t.style.fontSize = "13px";
  t.style.fontWeight = "700";
  t.style.zIndex = "9999";
  t.style.boxShadow = "var(--shl)";

  document.body.appendChild(t);

  setTimeout(()=>t.remove(),2600);
}

function badge(status) {
  const map = {
    ok:["Licença ativa","b-ok"],
    active:["Licença ativa","b-ok"],
    missing:["Sem licença","b-mi"],
    expired:["Licença vencida","b-ex"],
    upcoming:["Próxima ao vencimento","b-up"],
    pending:["Pendente","b-pe"],
    completed:["Concluída","b-dn"],
    partial:["Parcial","b-up"]
  };

  const [txt, cls] = map[status] || [status || "—","b-pe"];

  return `<span class="badge ${cls}">${txt}</span>`;
}

function openModal(html) {
  const root = document.getElementById("modalRoot");

  root.innerHTML = `
    <div
      onclick="if(event.target===this)closeModal()"
      style="
        position:fixed;
        inset:0;
        z-index:500;
        display:flex;
        align-items:center;
        justify-content:center;
        background:rgba(0,0,0,.32);
        backdrop-filter:blur(8px);
        padding:20px
      "
    >
      <div style="
        background:#fff;
        border-radius:16px;
        width:100%;
        max-width:520px;
        box-shadow:var(--shl);
        overflow:hidden
      ">
        ${html}
      </div>
    </div>
  `;
}

function closeModal() {
  document.getElementById("modalRoot").innerHTML = "";
}

function openSearch() {
  showToast("Busca global será carregada na próxima etapa.");
}

/* ============================================================
   NAV
============================================================ */

document.querySelectorAll(".nb").forEach(btn => {
  btn.onclick = () => showTab(btn.dataset.tab);
});

function showTab(tab) {
  currentTab = tab;

  document.querySelectorAll(".nb").forEach(b => b.classList.remove("on"));

  const active = document.querySelector(`[data-tab="${tab}"]`);
  if (active) active.classList.add("on");

  document.getElementById("tbTitle").textContent = TABS[tab] || tab;
  document.getElementById("mainWrap").scrollTop = 0;

  const app = document.getElementById("app");
  app.innerHTML = `<div class="loading"><span class="spin"></span> Carregando</div>`;

  if (tab === "dashboard") renderDashboard();
  if (tab === "docs") renderDocs();
  if (tab === "assets") renderAssets();
  if (tab === "conditions") renderConditions();
  if (tab === "planning") renderPlanning();
}
/* ============================================================
   DASHBOARD
============================================================ */

async function renderDashboard() {
  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="loading">
      <span class="spin"></span>
      Carregando visão executiva
    </div>
  `;

  const [overview, byField, thermo] = await Promise.all([
    sf(`${API}/executive/overview`),
    sf(`${API}/compliance/by_field`),
    sf(`${API}/conditions/conformity-indicator`)
  ]);

  if (!overview) {
    app.innerHTML = `<div class="emsg">Erro ao carregar visão executiva.</div>`;
    return;
  }

  const fields = byField?.all_fields || [];
  const condFields = byField?.conditions_by_field || [];
  const th = thermo || {};

  const maxWells = Math.max(1, ...fields.map(f => Number(f.total_wells || 0)));
  const maxCond = Math.max(1, ...condFields.map(f => Number(f.total_conditions || 0)));

    </div>
  `;

  query.set("limit","50");
  query.set("offset",String(assetPage*50));

  if (assetSearch) query.set("search",assetSearch);
  if (assetStatus) query.set("compliance_status",assetStatus);
  if (assetField) query.set("field",assetField);
  if (assetSituation) query.set("operational",assetSituation);

  const [summary, filters, data] = await Promise.all([
    sf(`${API}/assets/summary`),
    sf(`${API}/assets/filters`),
    sf(`${API}/assets/unified?${query}`)

    </div>

      <select class="sel" id="assetFieldSel">

        <option value="ok" ${assetStatus==="ok"?"selected":""}>Licença ativa</option>
        <option value="missing" ${assetStatus==="missing"?"selected":""}>Sem licença</option>
        <option value="expired" ${assetStatus==="expired"?"selected":""}>Licença vencida</option>
        <option value="upcoming" ${assetStatus==="upcoming"?"selected":""}>Próxima ao vencimento</option>

        <thead>

            <th>Campo</th>

          ${items.map(a=>`

              <td><strong>${escapeHtml(a.code || "—")}</strong></td>

              <td style="color:var(--t2)">${escapeHtml(a.situation || "—")}</td>

                ${

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;color:var(--t2);font-size:12.5px">
      <span>Mostrando ${items.length} de ${total} · Página ${assetPage+1}</span>
      <div style="display:flex;gap:7px">
        <button class="btn btn-g btn-sm" ${assetPage===0?"disabled":""} onclick="prevAssets()">← Anterior</button>
        <button class="btn btn-g btn-sm" ${assetPage>=maxPage?"disabled":""} onclick="nextAssets(${maxPage})">Próxima →</button>
      </div>
    </div>
  `;
}

function applyAssetsFilter() {
  assetSearch = document.getElementById("assetSearchInp").value || "";
  assetField = document.getElementById("assetFieldSel").value || "";
  assetSituation = document.getElementById("assetSituationSel").value || "";
  assetStatus = document.getElementById("assetStatusSel").value || "";
  assetPage = 0;
  renderAssets();
}

function prevAssets() {
  if (assetPage > 0) {
    assetPage--;
    renderAssets();
  }
}

function nextAssets(maxPage) {
  if (assetPage < maxPage) {
    assetPage++;
    renderAssets();
  }
}

async function uploadDoc(type) {
  const input = document.getElementById(type === "license" ? "pdfFile" : "billetFile");
  const status = document.getElementById(type === "license" ? "upStatus" : "billetStatus");

  const file = input?.files?.[0];

  if (!file) return;

  status.innerHTML = `<div class="loading" style="padding:10px"><span class="spin"></span> Processando documento...</div>`;

  const fd = new FormData();
  fd.append("file",file);

  const result = await fetch(`${API}/licenses/upload?doc_type=${type}`, {
    method:"POST",
    body:fd
  }).then(r=>r.json()).catch(()=>null);

  if (!result || result.error) {
    status.innerHTML = `<div class="emsg">Erro no upload: ${escapeHtml(result?.error || "sem resposta")}</div>`;
    return;
  }

  if (type === "billet") {
    status.innerHTML = `
      <div class="omsg">
        Boleto processado. Valor identificado: <strong>${fmtBRLFull(result.valor || 0)}</strong>.
        ${result.linked ? "Valor histórico atualizado para o ativo/licença." : "Nenhuma licença correspondente foi localizada."}
      </div>
    `;
  } else {
    status.innerHTML = `<div class="omsg">Licença carregada com sucesso.</div>`;
  }

  await loadDocs();
}

async function deleteLicense(id) {
  if (!id) return;

  const ok = confirm("Apagar esta licença e suas condicionantes vinculadas? Esta ação não pode ser desfeita.");

  if (!ok) return;

  const result = await sf(`${API}/licenses/${id}`, {
    method:"DELETE"
  });

  if (result && result.ok) {
    showToast("Licença apagada com sucesso.");
    await loadDocs();

    if (currentTab === "assets") renderAssets();
    if (currentTab === "dashboard") renderDashboard();
  } else {
    alert("Erro ao apagar licença.");
  }
}

      <button class="btn btn-sm ${condFilter==="pending"?"":"btn-g"}" onclick="setCondFilter('pending')">Pendentes</button>
      <button class="btn btn-sm ${condFilter==="completed"?"":"btn-g"}" onclick="setCondFilter('completed')">Concluídas</button>
      <button class="btn btn-sm ${condFilter==="queue"?"":"btn-g"}" onclick="setCondFilter('queue')">Fila operacional</button>
    </div>

    <div class="toolbar">
      <select class="sel" id="condFieldSel">
        <option value="">Campo: todos</option>
        ${(fields || []).map(f=>`
          <option value="${escapeHtml(f)}" ${condField===f?"selected":""}>${escapeHtml(f)}</option>
        `).join("")}
      </select>

      <select class="sel" id="condAgencySel">
        <option value="">Órgão: todos</option>
        ${agencies.map(a=>`
          <option value="${escapeHtml(a)}" ${condAgency===a?"selected":""}>${escapeHtml(a)}</option>
        `).join("")}
      </select>

      <button class="btn" onclick="applyCondFilters()">Aplicar</button>
      <button class="btn btn-g" onclick="collapseAllConditions()">Recolher</button>
      <button class="btn btn-g" onclick="expandAllConditions()">Expandir</button>
      <button class="btn btn-g" onclick="exportConditions()">Exportar CSV</button>
    </div>

    <div id="condList">
      ${items.length ? items.map(renderConditionCard).join("") : `<div class="empty">Nenhuma condicionante encontrada.</div>`}
    </div>
  `;
}

function setCondFilter(f) {
  condFilter = f;
  renderConditions();
}

function applyCondFilters() {
  condField = document.getElementById("condFieldSel").value || "";
  condAgency = document.getElementById("condAgencySel").value || "";
  renderConditions();
}

function expandAllConditions() {
  document.querySelectorAll("[data-condition-card]").forEach(el=>{
    condExpanded.add(String(el.dataset.conditionCard));
  });
  renderConditions();
}

function collapseAllConditions() {
  condExpanded.clear();
  renderConditions();
}

function exportConditions() {
  const q = new URLSearchParams();

  if (condField) q.set("field",condField);
  if (condAgency) q.set("agency",condAgency);
  if (condFilter !== "all") q.set("status_filter",condFilter);

  window.open(`${API}/conditions/export?${q}`,"_blank");
}

function toggleCondition(id) {
  if (condExpanded.has(id)) condExpanded.delete(id);

  renderConditions();
}

function openConditionCloseModal(conditionId, assetId, assetCode, estimatedCost) {
  openModal(`
    <div style="padding:22px">
      <div style="font-size:18px;font-weight:800;margin-bottom:4px">
        Dar baixa na condicionante
      </div>

      <div style="font-size:13px;color:var(--t2);margin-bottom:14px">

        </label>

        <label style="font-size:12px;color:var(--t2)">
          Custo real executado
          <input id="closeCost" class="inp" type="number" style="width:100%;margin-top:4px" value="${Number(estimatedCost || 0)}">
        </label>

        <label style="font-size:12px;color:var(--t2)">

async function completeConditionAsset(conditionId, assetId) {
  const payload = {
    completed_by: document.getElementById("closeResponsible")?.value || "sistema",
    observation: document.getElementById("closeObs")?.value || "",
    custo_real: Number(document.getElementById("closeCost")?.value || 0)
  };

  const result = await sf(`${API}/conditions/${conditionId}/assets/${assetId}/complete`, {
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });

  if (result && result.ok) {
    showToast("Baixa realizada com sucesso.");
    closeModal();
    condExpanded.add(String(conditionId));
    await renderConditions();
  } else {
    alert("Erro ao dar baixa.");
  }
}

async function completeConditionAll(conditionId) {
  const ok = confirm("Dar baixa em todos os ativos desta condicionante?");

  if (!ok) return;

  const result = await sf(`${API}/conditions/${conditionId}/complete-all`, {
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      completed_by:"sistema"
    })
  });

  if (result && result.ok) {
    showToast("Condicionante concluída.");
    await renderConditions();
  } else {
    alert("Erro ao concluir condicionante.");
  }
}

function getBudgetStore() {
  try {
    return JSON.parse(localStorage.getItem("envlicense_budget_v6") || "{}");
  } catch(e) {
    return {};
  }
}

function setBudgetStore(obj) {
  localStorage.setItem("envlicense_budget_v6", JSON.stringify(obj || {}));
}

function budgetForMonth(label) {
  return Number(getBudgetStore()[String(label || "").trim()] || 0);
}

async function renderPlanning() {
  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="loading">
      <span class="spin"></span>
      Carregando gestão financeira
    </div>
  `;

  const [summary, months, byField, byCat, projection] = await Promise.all([
    sf(`${API}/financial/summary`),
    sf(`${API}/financial/by_month`),
    sf(`${API}/financial/by_field`),
    sf(`${API}/financial/by_category`),
    sf(`${API}/financial/projection?years=${passiveYears}&only=${planningOnly}`)
  ]);

  if (!summary || !projection) {
    app.innerHTML = `<div class="emsg">Erro ao carregar gestão financeira.</div>`;
    return;
  }

  const monthRows = Array.isArray(months) ? months : [];
  const fieldRows = Array.isArray(byField) ? byField : [];
  const catRows = Array.isArray(byCat) ? byCat : [];
  const projRows = Array.isArray(projection.rows) ? projection.rows : [];

  window.__planningMonths = monthRows;

  const budgetTotal = monthRows.reduce((s,m)=>s + budgetForMonth(m.label),0);
  const realized = Number(summary.total_realizado || 0);
  const passive = Number(projection.summary?.mapped_total || summary.total_provisionado || 0);
  const operational = Number(projection.summary?.operational_total || 0);
  const balance = budgetTotal - realized;

  const maxMonth = Math.max(
    1,
    ...monthRows.map(m=>Math.max(
      Number(m.realizado || 0),
      Number(m.budget || 0),
      budgetForMonth(m.label)
    ))
  );

  const monthBars = monthRows.map(m=>{
    const real = Number(m.realizado || 0);
    const budget = Number(m.budget || 0) || budgetForMonth(m.label);
    const rH = real > 0 ? Math.max(3,Math.round(real/maxMonth*118)) : 2;
    const bH = budget > 0 ? Math.max(3,Math.round(budget/maxMonth*118)) : 0;
    const over = budget > 0 && real > budget;

    return `
      <div style="flex:1;min-width:0;text-align:center">
        <div style="height:122px;display:flex;align-items:flex-end;justify-content:center;gap:2px">
          ${
            budget > 0
            ? `<div title="Budget: ${fmtBRLFull(budget)}" style="width:42%;height:${bH}px;background:var(--bt);border:1.5px dashed var(--b);border-radius:5px 5px 0 0"></div>`
            : ""
          }
          <div title="Realizado: ${fmtBRLFull(real)}" style="width:42%;height:${rH}px;background:${over ? "var(--r)" : "var(--p)"};border-radius:5px 5px 0 0"></div>
        </div>
        <div style="font-size:9px;color:var(--t4);margin-top:5px;white-space:nowrap;overflow:hidden">${escapeHtml(m.label || "")}</div>
        ${over ? `<div style="font-size:9px;color:var(--r);font-weight:800">+${fmtBRL(real-budget)}</div>` : ""}
      </div>
    `;
  }).join("");

  const maxField = Math.max(1,...fieldRows.map(f=>Number(f.total || 0)));
  const fieldBars = fieldRows.slice(0,8).map(f=>`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div style="width:120px;font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(f.field || "—")}</div>
      <div style="flex:1;height:6px;background:var(--bdl);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${Math.round(Number(f.total || 0)/maxField*100)}%;background:var(--p)"></div>
      </div>
      <div style="width:72px;text-align:right;font-size:11.5px;color:var(--t2)">${fmtBRL(f.total)}</div>
    </div>
  `).join("");

  const maxCat = Math.max(1,...catRows.map(c=>Number(c.estimado || 0)));
  const catBars = catRows.map(c=>{
    const color = CAT_COLOR[c.category] || "var(--wg)";
    return `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:120px;font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(c.label || c.category || "—")}</div>
        <div style="flex:1;height:6px;background:var(--bdl);border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${Math.round(Number(c.estimado || 0)/maxCat*100)}%;background:${color}"></div>
        </div>
        <div style="width:72px;text-align:right;font-size:11.5px;color:var(--t2)">${fmtBRL(c.estimado)}</div>
      </div>
    `;
  }).join("");

  app.innerHTML = `
    <div class="ph">
      <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap">
        <div>
          <h1>Gestão financeira regulatória</h1>
          <p>Passivo mapeado, budget, valores históricos e simulador real</p>
        </div>

        <button class="btn btn-g btn-sm" onclick="openCostTooltip()">
          Valores históricos
        </button>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi green">
        <div class="kl">Realizado</div>
        <div class="kv" style="font-size:22px">${fmtBRL(realized)}</div>
        <div class="ks">Executado no período</div>
      </div>

      <div class="kpi ${budgetTotal>0 ? (balance>=0 ? "green" : "red") : "amber"}">
        <div class="kl">Saldo vs budget</div>
        <div class="kv" style="font-size:22px;color:${budgetTotal>0 ? (balance>=0 ? "var(--p)" : "var(--r)") : "var(--t3)"}">
          ${budgetTotal>0 ? fmtBRL(balance) : "—"}
        </div>
        <div class="ks">${budgetTotal>0 ? (balance>=0 ? "Dentro do budget" : "Acima do budget") : "Informe o budget mensal"}</div>
      </div>

      <div class="kpi amber">
        <div class="kl">Passivo mapeado</div>
        <div class="kv" style="font-size:22px">${fmtBRL(passive)}</div>
        <div class="ks">Condicionantes + licenças</div>
      </div>

      <div class="kpi ${operational>0 ? "red" : "green"}">
        <div class="kl">Passivo operacional</div>
        <div class="kv" style="font-size:22px;color:${operational>0 ? "var(--r)" : "var(--p)"}">${fmtBRL(operational)}</div>
        <div class="ks">Poços produzindo/injetando</div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px">
        <div>
          <div class="ct" style="margin-bottom:4px">Curva financeira mensal</div>
          <div style="font-size:12.5px;color:var(--t2)">
            Realizado versus budget e custos previstos por vencimento/prazo.
          </div>
        </div>

        <button class="btn btn-g btn-sm" onclick="openBudgetModal(window.__planningMonths || [])">
          + Budget
        </button>
      </div>

      ${
        monthRows.length
        ? `
          <div style="display:flex;align-items:flex-end;gap:5px;height:132px">
            ${monthBars}
          </div>

          <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:10px">
            <div style="font-size:12px;color:var(--t2)"><span style="display:inline-block;width:9px;height:9px;background:var(--p);border-radius:3px"></span> Realizado</div>
            <div style="font-size:12px;color:var(--t2)"><span style="display:inline-block;width:9px;height:9px;background:var(--bt);border:1px dashed var(--b);border-radius:3px"></span> Budget/previsão</div>
            <div style="font-size:12px;color:var(--t2)"><span style="display:inline-block;width:9px;height:9px;background:var(--r);border-radius:3px"></span> Acima do budget</div>
          </div>
        `
        : `<div class="empty">Sem dados mensais.</div>`
      }
    </div>

    <div class="g2">
      <div class="card">
        <div class="ct">Custo por campo</div>
        ${fieldBars || `<div class="empty">Sem dados por campo.</div>`}
      </div>

      <div class="card">
        <div class="ct">Custo por categoria</div>
        ${catBars || `<div class="empty">Sem dados por categoria.</div>`}
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:16px">
        <div>
          <div class="ct" style="margin-bottom:4px">Simulador de dissolução do passivo</div>
          <div style="font-size:12.5px;color:var(--t2)">
            Simulação baseada em condicionantes pendentes, licenças a renovar e custos históricos reais.
          </div>

function renderProjectionCard(title,key,projection,rows,color) {
  const summary = projection.summary || {};

  const annualKey = key + "_annual";
  const finishKey = key + "_finish_year";

  const annual = Number(summary[annualKey] || 0);
  const finish = summary[finishKey] || "—";

  const last = rows.length ? rows[rows.length-1][key] : {};
  const remaining = Number(last?.remaining || 0);
  const conclusion = Number(last?.conclusion_pct || 0);

  const maxInvest = Math.max(1,...rows.map(r=>Number(r[key]?.investment || 0)));

  const bars = rows.map(r=>{
    const invest = Number(r[key]?.investment || 0);
    const rem = Number(r[key]?.remaining || 0);
    const h = invest>0 ? Math.max(5,Math.round(invest/maxInvest*62)) : 3;

    return `
      <div style="flex:1;text-align:center">
        <div title="${r.year}: ${fmtBRLFull(invest)} investido | ${fmtBRLFull(rem)} residual"
          style="height:${h}px;width:72%;margin:0 auto;background:${invest>0 ? color : "var(--bdl)"};border-radius:5px 5px 0 0;opacity:${invest>0?".9":".5"}">
        </div>
        <div style="font-size:9px;color:${invest>0?"var(--t2)":"var(--t4)"};margin-top:4px">
          ${invest>0 ? fmtBRL(invest) : rem<=0 ? "Zerado" : "—"}
        </div>
        <div style="font-size:9px;color:var(--t4)">${String(r.year).slice(2)}</div>
      </div>
    `;
  }).join("");

  return `
    <div style="background:var(--bg);border:1px solid var(--bdl);border-radius:14px;padding:16px">
      <div style="font-size:11px;font-weight:800;text-transform:uppercase;color:${color};letter-spacing:.06em;margin-bottom:8px">
        ${title}
      </div>

      <div style="display:grid;gap:8px;margin-bottom:12px">
        <div style="background:#fff;border:1px solid var(--bdl);border-radius:10px;padding:10px">
          <div style="font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:800">Aporte anual</div>
          <div style="font-size:16px;font-weight:800">${fmtBRLFull(annual)}</div>
        </div>

        <div style="background:#fff;border:1px solid var(--bdl);border-radius:10px;padding:10px">
          <div style="font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:800">Passivo residual</div>
          <div style="font-size:16px;font-weight:800;color:${remaining>0?"var(--r)":"var(--p)"}">${fmtBRLFull(remaining)}</div>
        </div>

        <div style="background:#fff;border:1px solid var(--bdl);border-radius:10px;padding:10px">
          <div style="font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:800">Conclusão</div>
          <div style="font-size:16px;font-weight:800">${pct(conclusion)} · ${finish}</div>
        </div>
      </div>

      <div style="display:flex;align-items:flex-end;gap:5px;height:86px">
        ${bars}
      </div>
    </div>
  `;
}

function openBudgetModal(months) {
  const store = getBudgetStore();

  const rows = (months || []).map(m=>{
    const key = String(m.label || "").trim();

    return `
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdl)">
        <div style="font-size:13px;font-weight:700">${escapeHtml(m.label || "Mês")}</div>
        <input class="inp" type="number" data-budget-key="${escapeHtml(key)}" value="${store[key] || 0}" style="width:130px;text-align:right">
      </div>
    `;
  }).join("");

  openModal(`
    <div style="padding:22px">
      <div style="font-size:18px;font-weight:800;margin-bottom:4px">
        Budget mensal
      </div>

      <div style="font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:14px">
        Informe o budget mensal planejado. O gráfico compara o realizado com o budget.
      </div>

      <div style="max-height:360px;overflow:auto">
        ${rows || `<div class="empty">Sem meses disponíveis.</div>`}
      </div>

      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">
        <button class="btn btn-g" onclick="closeModal()">Cancelar</button>
        <button class="btn" onclick="saveBudgetModal()">Salvar budget</button>
      </div>
    </div>
  `);
}

function saveBudgetModal() {
  const obj = getBudgetStore();

  document.querySelectorAll("[data-budget-key]").forEach(inp=>{
    obj[inp.dataset.budgetKey] = Number(inp.value || 0);
  });

  setBudgetStore(obj);
  closeModal();
  showToast("Budget salvo.");
  renderPlanning();
}

showTab("dashboard");
