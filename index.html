<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teste</title>
</head>
<body style="font-family:system-ui;padding:40px">
<h1 id="title">Carregando...</h1>
<div id="status"></div>
<script>
const API="https://envlicense-backend.onrender.com";
async function test(){
  const title=document.getElementById("title");
  const status=document.getElementById("status");
  title.textContent="Testando backend...";
  try{
    const r=await fetch(`${API}/health`);
    const d=await r.json();
    title.textContent="✅ Backend OK";
    status.innerHTML="<pre>"+JSON.stringify(d,null,2)+"</pre>";
    
    const r2=await fetch(`${API}/dashboard`);
    const d2=await r2.json();
    status.innerHTML+="<h2>Dashboard:</h2><pre>"+JSON.stringify(d2,null,2)+"</pre>";
    
    const r3=await fetch(`${API}/compliance/summary`);
    const d3=await r3.json();
    status.innerHTML+="<h2>Compliance:</h2><pre>"+JSON.stringify(d3,null,2)+"</pre>";
  }catch(e){
    title.textContent="❌ ERRO: "+e.message;
    status.innerHTML="<pre style='color:red'>"+e.stack+"</pre>";
  }
}
test();
</script>
</body>
</html>
