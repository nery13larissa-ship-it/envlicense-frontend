<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EnvLicense — PetroRecôncavo</title>
<style>
:root{
  --p:#007023;--ph:#005a1c;--pl:#4EA72E;--pt:#e8f5ec;
  --wg:#8FBF21;--w:#F9CE29;--wt:#7a5e00;
  --r:#9D2928;--rh:#7a1f1e;--rt:#fbeded;
  --b:#125E81;--bt:#deeef5;
  --t1:#1d1d1f;--t2:#6e6e73;--t3:#86868b;--t4:#aeaeb2;
  --bd:#d2d2d7;--bdl:#f0f0f5;--bg:#f5f5f7;--s:#fff;
  --rad:12px;--rads:8px;
  --ease:cubic-bezier(.4,0,.2,1);
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
  --shl:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.07);
  --sw:56px;--se:220px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;overflow:hidden}

/* SIDEBAR */
.sb{width:var(--sw);background:var(--s);border-right:1px solid var(--bdl);display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:100;overflow:hidden;transition:width .22s var(--ease);flex-shrink:0}
.sb:hover{width:var(--se)}
.sb-brand{display:flex;align-items:center;gap:10px;padding:16px 14px;border-bottom:1px solid var(--bdl);min-height:58px;overflow:hidden;white-space:nowrap}
.sb-mark{width:28px;height:28px;min-width:28px;background:linear-gradient(135deg,var(--p),var(--pl));border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px}
.sb-txt{opacity:0;transform:translateX(-8px);transition:all .18s var(--ease)}
.sb:hover .sb-txt{opacity:1;transform:none}
.sb-name{font-weight:600;font-size:13.5px;letter-spacing:-.02em;white-space:nowrap}
.sb-sub{font-size:10px;color:var(--t3)}
.sb-sec{padding:6px 0}
.sb-lbl{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:.08em;font-weight:700;padding:7px 16px 3px;opacity:0;transition:opacity .18s var(--ease);white-space:nowrap}
.sb:hover .sb-lbl{opacity:1}
.nb{width:100%;background:transparent;border:none;padding:7px 14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:11px;color:var(--t2);transition:all .13s var(--ease);min-height:38px;overflow:hidden;white-space:nowrap}
.nb:hover{background:var(--bdl);color:var(--t1)}
.nb.on{background:var(--pt);color:var(--p)}
.nb-ic{width:20px;height:20px;min-width:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nb-ic svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nb-lbl{font-size:13px;opacity:0;transform:translateX(-5px);transition:all .18s var(--ease);white-space:nowrap}
.sb:hover .nb-lbl{opacity:1;transform:none}
.nb.on .nb-lbl{font-weight:500}
.sb-foot{margin-top:auto;padding:10px 14px;border-top:1px solid var(--bdl);overflow:hidden;white-space:nowrap;display:flex;align-items:center;gap:8px}
.sb-ver{width:28px;height:28px;min-width:28px;background:var(--bdl);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--t3)}
.sb-ft{font-size:10px;color:var(--t4);opacity:0;transition:opacity .18s var(--ease)}
.sb:hover .sb-ft{opacity:1}

/* MAIN — FIX SCROLL */
.main-wrap{margin-left:var(--sw);flex:1;height:100vh;overflow-y:auto;overflow-x:hidden;transition:margin-left .22s var(--ease);display:flex;flex-direction:column}
.sb:hover~.main-wrap{margin-left:var(--se)}
.topbar{background:var(--s);border-bottom:1px solid var(--bdl);padding:0 28px;height:54px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;flex-shrink:0}
.tb-ttl{font-size:14.5px;font-weight:600;letter-spacing:-.02em;flex:1}
.sp-btn{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--bdl);border-radius:9px;padding:6px 12px;cursor:pointer;color:var(--t3);font-size:12.5px;font-family:inherit;transition:all .13s var(--ease);width:300px}
.sp-btn:hover{border-color:var(--bd)}
.sp-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sp-ph{flex:1;text-align:left}
.sp-kc{font-size:11px;background:var(--s);border:1px solid var(--bd);padding:1px 5px;border-radius:4px;color:var(--t3)}
.cnt{padding:24px 28px 80px;flex:1}

/* BASE */
.ph{margin-bottom:16px}
.ph h1{font-size:24px;font-weight:600;letter-spacing:-.025em;margin-bottom:2px}
.ph .sub{font-size:13px;color:var(--t2)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:12px}
.kpi{background:var(--s);padding:15px 17px;border-radius:var(--rad);border:1px solid var(--bdl);box-shadow:var(--sh)}
.kl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:6px}
.kv{font-size:26px;font-weight:700;letter-spacing:-.03em;line-height:1}
.ks{font-size:11.5px;color:var(--t3);margin-top:4px}
.kdelta{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:500;padding:2px 6px;border-radius:4px;margin-top:4px}
.dg{background:#e8f5ec;color:#1f5f33}.dr{background:var(--rt);color:var(--r)}.df{background:var(--bdl);color:var(--t2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:1050px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr}}
.card{background:var(--s);border:1px solid var(--bdl);border-radius:var(--rad);padding:18px;box-shadow:var(--sh)}
.ct{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}

/* THERMO */
.thermo{background:var(--s);border:1px solid var(--bdl);border-radius:var(--rad);padding:16px 20px;margin-bottom:12px;box-shadow:var(--sh);position:relative;overflow:visible}
.th-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.th-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.th-pct{font-size:28px;font-weight:700;letter-spacing:-.03em;line-height:1}
.th-label{font-size:12px;color:var(--t2);margin-top:3px}
.th-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;font-size:11.5px;font-weight:600;cursor:help;position:relative}
.th-tooltip{display:none;position:absolute;right:0;top:calc(100%+6px);background:var(--t1);color:#fff;font-size:11px;padding:8px 12px;border-radius:8px;z-index:20;width:240px;white-space:normal;line-height:1.5}
.th-badge:hover .th-tooltip{display:block}
.th-bar-bg{height:5px;background:var(--bdl);border-radius:3px;overflow:hidden;margin:10px 0 8px}
.th-bar{height:100%;border-radius:3px;transition:width .8s var(--ease)}
.th-meta{display:flex;gap:16px;flex-wrap:wrap}
.th-stat{font-size:11px;color:var(--t2)}
.th-stat strong{color:var(--t1);font-weight:600}

/* BARS */
.blist{list-style:none;display:flex;flex-direction:column;gap:9px}
.bitem{display:flex;align-items:center;gap:9px}
.blbl{font-size:12px;font-weight:500;min-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btrack{flex:1;height:5px;background:var(--bdl);border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px;transition:width .7s var(--ease)}
.bval{font-size:11.5px;color:var(--t2);min-width:55px;text-align:right;font-variant-numeric:tabular-nums}

/* SCENARIO */
.sc-wrap{border-radius:var(--rad);padding:16px 18px;border:1px solid}
.sc-head{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.sc-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sc-icon svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.sc-item{display:flex;align-items:flex-start;gap:7px;font-size:12px;line-height:1.5;margin-bottom:4px}
.sc-item svg{width:12px;height:12px;flex-shrink:0;margin-top:2px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* TABLE */
.tw{border:1px solid var(--bdl);border-radius:var(--rad);overflow:hidden;overflow-x:auto;background:var(--s)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 13px;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;font-weight:700;border-bottom:1px solid var(--bdl);background:var(--bg);white-space:nowrap}
td{padding:11px 13px;border-bottom:1px solid var(--bdl);font-size:12.5px;color:var(--t1);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,112,35,.02)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500;white-space:nowrap}
.b-ok{background:#e8f5ec;color:#1f5f33}
.b-up{background:#fef7d8;color:var(--wt)}
.b-ex{background:var(--rt);color:var(--r)}
.b-mi{background:#f0d8d8;color:#6b1c1c}
.b-cr{background:#fde8e8;color:#7a0000}
.b-pt{background:#fff0d8;color:#7a4400}
.b-pe{background:#e8ecf5;color:#1e3a8a}
.b-dn{background:#e8f5ec;color:#1f5f33}
.b-ot{background:var(--bdl);color:var(--t2)}

/* PDF LINK */
.pdf-btn{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:5px;background:var(--rt);color:var(--r);font-size:11.5px;font-weight:600;text-decoration:none;transition:all .13s var(--ease);border:1px solid #f5c6c6}
.pdf-btn:hover{background:var(--r);color:#fff;border-color:var(--r)}
.pdf-btn svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* TOOLBAR */
.toolbar{background:var(--s);border:1px solid var(--bdl);border-radius:var(--rad);padding:9px 11px;margin-bottom:11px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;box-shadow:var(--sh)}
.inp{background:var(--bg);border:1px solid var(--bdl);border-radius:var(--rads);padding:6px 10px;font-size:13px;color:var(--t1);outline:none;font-family:inherit;transition:border-color .13s var(--ease);flex:1;min-width:140px}
.inp:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(0,112,35,.07)}
.sel{background:var(--bg);border:1px solid var(--bdl);border-radius:var(--rads);padding:6px 10px;font-size:13px;color:var(--t1);outline:none;font-family:inherit;min-width:120px;cursor:pointer}
.sel:focus{border-color:var(--p)}
.btn{background:var(--p);color:#fff;border:none;padding:6px 14px;border-radius:var(--rads);font-size:13px;font-weight:500;cursor:pointer;transition:all .13s var(--ease);font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--ph)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--bd)}.btn-g:hover{background:var(--bdl);color:var(--t1)}
.btn-r{background:var(--r)}.btn-r:hover{background:var(--rh)}
.btn-a{background:var(--pl)}.btn-a:hover{background:#3d8f22}
.btn-yg{background:var(--wg);color:#fff}.btn-yg:hover{background:#749e18}
.btn-sm{padding:4px 10px;font-size:12px}
.ib{background:transparent;border:none;cursor:pointer;padding:4px;border-radius:5px;color:var(--t3);transition:all .13s var(--ease);display:inline-flex;align-items:center}
.ib:hover{background:var(--rt);color:var(--r)}
.ib svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* FCHIPS */
.fchips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.fchip{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s var(--ease);border:1px solid var(--bdl);background:var(--s);color:var(--t2)}
.fchip:hover{border-color:var(--bd);color:var(--t1)}
.fchip.on{background:var(--p);color:#fff;border-color:var(--p)}
.fchip.red.on{background:var(--r);border-color:var(--r)}
.fchip.amber.on{background:var(--w);color:var(--wt);border-color:var(--w)}
.fchip.green.on{background:var(--pl);border-color:var(--pl)}
.fchip-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* CONDITION CARDS */
.ccard{background:var(--s);border:1px solid var(--bdl);border-left:3px solid var(--bd);border-radius:var(--rad);margin-bottom:8px;box-shadow:var(--sh);overflow:hidden;transition:box-shadow .13s var(--ease)}
.ccard:hover{box-shadow:var(--shl)}
.ccard-head{padding:12px 15px;cursor:pointer;display:flex;align-items:flex-start;gap:10px}
.ccard-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.ccat{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.ccard-title{font-size:13px;font-weight:500;color:var(--t1);line-height:1.5}
.ccard-prog{display:flex;align-items:center;gap:9px;margin-top:8px}
.cpbar{flex:1;height:4px;background:var(--bdl);border-radius:2px;overflow:hidden}
.cpfill{height:100%;border-radius:2px;transition:width .5s var(--ease)}
.cplbl{font-size:11px;color:var(--t2);white-space:nowrap}
.ccard-body{border-top:1px solid var(--bdl);padding:14px 15px;background:var(--bg)}
.ccard-full-desc{font-size:13px;color:var(--t1);line-height:1.65;margin-bottom:12px}
.ccard-asset-list{display:flex;flex-direction:column;gap:6px}
.cas-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--s);border:1px solid var(--bdl);border-radius:var(--rads)}
.cas-code{font-size:13px;font-weight:600;color:var(--t1);min-width:110px}
.cas-field{font-size:12px;color:var(--t3);flex:1}
.cas-done{display:flex;align-items:center;gap:4px;color:#1f5f33;font-size:12px;font-weight:500}
.cas-done svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.cas-btn{background:var(--p);color:#fff;border:none;padding:4px 11px;border-radius:5px;font-size:11.5px;font-weight:500;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px;transition:background .13s var(--ease);white-space:nowrap}
.cas-btn:hover{background:var(--ph)}
.cas-btn svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.ccard-all-btn{display:flex;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bdl)}

/* UPLOAD */
.upzone{border:1.5px dashed var(--bd);border-radius:var(--rad);padding:22px 18px;text-align:center;margin-bottom:14px;cursor:pointer;transition:all .18s var(--ease);background:var(--bg)}
.upzone:hover,.upzone.dov{border-color:var(--p);background:var(--pt)}
#pdfFile,#billetFile{display:none}

/* COST REF */
.cref-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdl)}
.cref-row:last-child{border-bottom:none}
.cref-lbl{flex:1;font-size:12.5px;color:var(--t1)}
.cref-inp{background:var(--bg);border:1px solid var(--bdl);border-radius:6px;padding:4px 8px;font-size:12.5px;color:var(--t1);outline:none;width:110px;text-align:right;font-family:inherit}
.cref-inp:focus{border-color:var(--p)}
.cref-save{background:var(--p);color:#fff;border:none;padding:3px 9px;border-radius:5px;font-size:11.5px;cursor:pointer;font-family:inherit}

/* FINANCIAL CHART - FIXED */
.fin-chart-wrap{height:160px;display:flex;align-items:flex-end;gap:2px;padding:0;margin-bottom:10px}
.fin-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.fin-bar-area{width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:140px}
.fin-bar-r{width:100%;background:var(--p);border-radius:2px 2px 0 0;min-height:0;transition:height .6s var(--ease)}
.fin-bar-p{width:100%;background:var(--p);opacity:.25;border-top:1.5px dashed var(--p);min-height:0;transition:height .6s var(--ease)}
.fin-xlabel{font-size:9px;color:var(--t4);text-align:center;white-space:nowrap;overflow:hidden;width:100%}
.fin-legend{display:flex;gap:14px;flex-wrap:wrap}
.fin-leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2)}
.fin-leg-dot{width:8px;height:8px;border-radius:2px}

/* PROJECTION */
.proj-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.proj-card{min-width:100px;background:var(--bg);border:1px solid var(--bdl);border-radius:var(--rads);padding:11px;text-align:center;flex-shrink:0}
.proj-year{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;margin-bottom:5px}
.proj-val{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:3px}
.proj-conf{font-size:11px}

/* SPOTLIGHT */
.spov{position:fixed;inset:0;background:rgba(0,0,0,.2);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:10vh}
.spov.on{display:flex}
.spbox{background:var(--s);border-radius:14px;width:100%;max-width:600px;box-shadow:var(--shl);overflow:hidden;border:1px solid var(--bdl)}
.sp-iw{display:flex;align-items:center;gap:11px;padding:14px 18px;border-bottom:1px solid var(--bdl)}
.sp-iw svg{width:16px;height:16px;stroke:var(--t3);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sp-i{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--t1);background:transparent}
.sp-esc{font-size:10px;background:var(--bdl);padding:2px 7px;border-radius:4px;color:var(--t2);cursor:pointer;border:none;font-family:inherit}
.sp-res{max-height:52vh;overflow-y:auto;padding:5px 0}
.sp-sec{font-size:9.5px;color:var(--t4);text-transform:uppercase;letter-spacing:.07em;font-weight:700;padding:7px 18px 4px}
.sp-it{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;transition:background .1s}
.sp-it:hover{background:var(--bg)}
.sp-ico{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sp-ico.a{background:var(--pt);color:var(--p)}.sp-ico.l{background:var(--bt);color:var(--b)}.sp-ico.c{background:#fef7d8;color:var(--wt)}
.sp-t{font-size:13px;font-weight:500;color:var(--t1)}
.sp-s{font-size:11px;color:var(--t3);margin-top:1px}
.sp-empty{padding:24px 18px;text-align:center;color:var(--t3);font-size:12.5px}
.hints{padding:9px 18px;border-top:1px solid var(--bdl)}
.hint{display:inline-block;background:var(--bg);border:1px solid var(--bdl);border-radius:5px;padding:3px 8px;font-size:11px;color:var(--t3);margin:2px;cursor:pointer;transition:all .1s}
.hint:hover{background:var(--pt);color:var(--p);border-color:var(--p)}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.28);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:300;display:none;align-items:center;justify-content:center;padding:18px}
.mov.on{display:flex}
.mbox{background:var(--s);border-radius:14px;width:100%;max-width:480px;box-shadow:var(--shl);overflow:hidden}
.mhead{padding:20px 20px 10px}
.mic{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:11px}
.mic svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.mttl{font-size:16px;font-weight:600;margin-bottom:4px}
.msub{font-size:13px;color:var(--t2);line-height:1.5}
.mbody{padding:5px 20px 0}
.minfo{background:var(--bg);border:1px solid var(--bdl);border-radius:var(--rads);padding:11px 13px;font-size:12px;color:var(--t2);margin:9px 0}
.mrow{display:flex;justify-content:space-between;padding:2px 0;gap:8px}
.mrow strong{color:var(--t1);font-weight:600}
.mact{padding:16px 20px;display:flex;gap:7px;justify-content:flex-end;border-top:1px solid var(--bdl);margin-top:14px;flex-wrap:wrap}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--t1);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:500;opacity:0;transform:translateY(8px);transition:all .25s var(--ease);pointer-events:none;box-shadow:var(--shl)}
.toast.show{opacity:1;transform:none}

/* MISC */
.loading{text-align:center;padding:32px;color:var(--t3);font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--bdl);border-top-color:var(--p);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:32px;text-align:center;color:var(--t3);font-size:13px}
.emsg{background:var(--rt);color:var(--r);padding:9px 12px;border-radius:var(--rads);font-size:12.5px;border:1px solid #f5c6c6;margin:7px 0}
.omsg{background:#e8f5ec;color:#1f5f33;padding:9px 12px;border-radius:var(--rads);font-size:12.5px;border:1px solid #c5e3d0;margin:7px 0}
.pag{display:flex;justify-content:space-between;align-items:center;padding:9px 2px;color:var(--t2);font-size:12px}
.sbar{background:var(--s);border:1px solid var(--bdl);border-radius:var(--rads);padding:8px 12px;margin-bottom:9px;font-size:12px;color:var(--t2)}
.sbar strong{color:var(--t1);font-weight:600}
.fmtbrl{font-variant-numeric:tabular-nums}
</style>
</head>
<body>

<aside class="sb" id="sb">
  <div class="sb-brand">
    <div class="sb-mark">PR</div>
    <div class="sb-txt"><div class="sb-name">EnvLicense</div><div class="sb-sub">PetroRecôncavo</div></div>
  </div>
  <div class="sb-sec">
    <div class="sb-lbl">Geral</div>
    <button class="nb on" data-tab="dashboard"><span class="nb-ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span><span class="nb-lbl">Visão executiva</span></button>
  </div>
  <div class="sb-sec">
    <div class="sb-lbl">Documentos</div>
    <button class="nb" data-tab="docs"><span class="nb-ic"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span><span class="nb-lbl">Central documental</span></button>
    <button class="nb" data-tab="assets"><span class="nb-ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg></span><span class="nb-lbl">Ativos</span></button>
    <button class="nb" data-tab="conditions"><span class="nb-ic"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span><span class="nb-lbl">Condicionantes</span></button>
  </div>
  <div class="sb-sec">
    <div class="sb-lbl">Planejamento</div>
    <button class="nb" data-tab="planning"><span class="nb-ic"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span><span class="nb-lbl">Gestão financeira</span></button>
  </div>
  <div class="sb-foot">
    <div class="sb-ver">v5</div><div class="sb-ft">EnvLicense · v5.5</div>
  </div>
</aside>

<div class="main-wrap" id="main-wrap">
  <div class="topbar">
    <div class="tb-ttl" id="tb-ttl">Visão executiva</div>
    <button class="sp-btn" onclick="openSp()">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="sp-ph">Buscar ativos, licenças, campos…</span>
      <span class="sp-kc">⌘K</span>
    </button>
  </div>
  <div class="cnt"><div id="app"><div class="loading"><span class="spin"></span> Carregando</div></div></div>
</div>

<div class="spov" id="spov" onclick="if(event.target===this)closeSp()">
  <div class="spbox">
    <div class="sp-iw"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="sp-i" id="sp-i" placeholder="Buscar ou tentar: 'ativos sem licença'…">
    <button class="sp-esc" onclick="closeSp()">esc</button></div>
    <div class="sp-res" id="sp-r"></div>
  </div>
</div>
<div class="mov" id="mov" onclick="if(event.target===this)closeMod()">
  <div class="mbox" id="mbox"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const API="https://envlicense-backend.onrender.com";
let filterCache=null,assetState={page:0,filters:{},search:""},spT=null,pendingFile=null;
let condState={filter:"all",field:"",expandedIds:new Set(),allItems:[],indicator:null};

const TABS={"dashboard":"Visão executiva","docs":"Central documental","assets":"Ativos","conditions":"Condicionantes","planning":"Gestão financeira regulatória"};
const CAT_COLOR={"monitoring":"#125E81","effluent":"#4EA72E","reporting":"#007023","infrastructure":"#F9CE29","other":"#86868b"};
const CAT_NAME={"monitoring":"Monitoramento","effluent":"Efluentes","reporting":"Relatórios","infrastructure":"Infraestrutura","other":"Outros"};
const OPERATIONAL=["PRODUZINDO","INJETANDO"];

// ===== UTILS =====
async function sf(url,opts={}){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),opts.timeout||18000);
  try{const r=await fetch(url,{...opts,signal:ctrl.signal});clearTimeout(t);if(!r.ok)return null;return await r.json();}
  catch(e){clearTimeout(t);console.error("fetch",e.message,url);return null;}
}
function fmtBRL(v){
  if(v===null||v===undefined)return"—";
  if(v===0)return"R$ 0";
  return"R$ "+Number(v).toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0});
}
function showToast(msg,dur=2800){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),dur);}
fetch(`${API}/health`).catch(()=>{});

// ===== NAV =====
document.querySelectorAll(".nb").forEach(b=>b.addEventListener("click",()=>show(b.dataset.tab,b)));
async function show(tab,btn){
  document.querySelectorAll(".nb").forEach(b=>b.classList.remove("on"));
  if(btn)btn.classList.add("on");
  else{const s=document.querySelector(`.nb[data-tab="${tab}"]`);if(s)s.classList.add("on");}
  document.getElementById("tb-ttl").textContent=TABS[tab]||tab;
  // Scroll to top on tab change
  document.getElementById("main-wrap").scrollTop=0;
  const app=document.getElementById("app");
  app.innerHTML='<div class="loading"><span class="spin"></span> Carregando</div>';
  try{
    if(tab==="dashboard") await renderDashboard();
    else if(tab==="docs") await renderDocs();
    else if(tab==="assets") await renderAssets();
    else if(tab==="conditions") await renderConditions();
    else if(tab==="planning") await renderPlanning();
  }catch(e){console.error(e);app.innerHTML=`<div class="emsg">Erro: ${e.message}</div>`;}
}

// ===== SPOTLIGHT =====
function openSp(){document.getElementById("spov").classList.add("on");setTimeout(()=>document.getElementById("sp-i").focus(),50);}
function closeSp(){document.getElementById("spov").classList.remove("on");document.getElementById("sp-i").value="";showHints();}
function showHints(){document.getElementById("sp-r").innerHTML=`<div class="hints"><div style="font-size:9.5px;color:var(--t4);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;font-weight:700">Sugestões</div><span class="hint" onclick="runHint('ativos sem licença')">ativos sem licença</span><span class="hint" onclick="runHint('licenças vencendo')">licenças vencendo</span><span class="hint" onclick="runHint('INEMA')">INEMA</span><span class="hint" onclick="runHint('PRODUZINDO')">em produção</span></div>`;}
showHints();
function runHint(q){document.getElementById("sp-i").value=q;doSearch(q);}
document.getElementById("sp-i").addEventListener("input",e=>{const q=e.target.value.trim();clearTimeout(spT);if(q.length<2){showHints();return;}spT=setTimeout(()=>doSearch(q),250);});
document.addEventListener("keydown",e=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();openSp();}if(e.key==="Escape"){closeSp();closeMod();}});
async function doSearch(q){
  const div=document.getElementById("sp-r");
  div.innerHTML='<div class="loading"><span class="spin"></span></div>';
  const ql=q.toLowerCase();let extra="";
  if(ql.includes("sem licença"))extra="missing";else if(ql.includes("vencendo")||ql.includes("vencida"))extra="expired";
  const r=await sf(`${API}/search?q=${encodeURIComponent(q)}`);
  if(!r){div.innerHTML='<div class="sp-empty">Erro na busca</div>';return;}
  let html="";
  if(extra)html+=`<div class="sp-sec">Ação rápida</div><div class="sp-it" onclick="closeSp();assetState={page:0,filters:{aSt:'${extra}'},search:''};show('assets')"><div class="sp-ico a">→</div><div><div class="sp-t">Ver ativos: ${extra==="missing"?"sem licença":"licença vencida"}</div><div class="sp-s">Filtrar automaticamente</div></div></div>`;
  if(r.assets?.length){html+=`<div class="sp-sec">Ativos</div>`;html+=r.assets.map(a=>`<div class="sp-it" onclick="closeSp();assetState={page:0,filters:{},search:'${a.code}'};show('assets')"><div class="sp-ico a">AT</div><div><div class="sp-t">${a.code||'—'}</div><div class="sp-s">${a.field||'—'} · ${a.state||'—'}</div></div></div>`).join('');}
  if(r.licenses?.length){html+=`<div class="sp-sec">Licenças</div>`;html+=r.licenses.map(l=>`<div class="sp-it" onclick="closeSp();show('docs')"><div class="sp-ico l">LI</div><div><div class="sp-t">${l.number||'—'}</div><div class="sp-s">${l.agency||'—'}</div></div></div>`).join('');}
  if(r.conditions?.length){html+=`<div class="sp-sec">Condicionantes</div>`;html+=r.conditions.map(c=>`<div class="sp-it" onclick="closeSp();show('conditions')"><div class="sp-ico c">CD</div><div><div class="sp-t">${(c.description||'').slice(0,60)}…</div></div></div>`).join('');}
  if(!html)html=`<div class="sp-empty">Nenhum resultado para "${q}"</div>`;
  div.innerHTML=html;
}

// ===== MODAL =====
function openMod(html){document.getElementById("mbox").innerHTML=html;document.getElementById("mov").classList.add("on");}
function closeMod(){document.getElementById("mov").classList.remove("on");}

// ===== VISUAL HELPERS =====
function bComp(s){const m={ok:["b-ok","Licença ativa"],upcoming:["b-up","Próxima ao venc."],expired:["b-ex","Licença vencida"],missing:["b-mi","Sem licença"],critical:["b-cr","⚠ Crítico"]};const[c,t]=m[s]||["b-ot",s];return`<span class="badge ${c}">${t}</span>`;}
function bSit(s){if(!s)return'<span class="badge b-ot">—</span>';const m={"PRODUZINDO":"b-ok","INJETANDO":"b-pe"};return`<span class="badge ${m[s]||'b-ot'}">${s.slice(0,14)}</span>`;}

function renderThermo(th,compact=false){
  const cols={green:"#007023","yellow-green":"#8FBF21",yellow:"#F9CE29",red:"#9D2928",gray:"#86868b"};
  const bgs={green:"#e8f5ec","yellow-green":"#f0f7e0",yellow:"#fef7d8",red:"#fbeded",gray:"var(--bdl)"};
  const col=cols[th.level]||"#86868b";
  const bg=bgs[th.level]||"var(--bdl)";
  const badge=th.level==="green"?"Adequado":th.level==="yellow-green"?"Operacionais OK":th.level==="red"?"Crítico":"Atenção";
  const pct=th.pct||0;
  const meta=`<div class="th-meta"><span class="th-stat"><strong>${th.completed||0}</strong>/${th.total||0} concluídas</span><span class="th-stat">Poços ativos: <strong style="color:${col}">${th.pct_active||0}%</strong></span>${th.critical_overdue>0?`<span class="th-stat" style="color:var(--r)">⚠ ${th.critical_overdue} críticas vencidas</span>`:''}</div>`;
  return `<div class="thermo">
    <div class="th-top">
      <div>
        <div class="th-title">Indicador de conformidade de condicionantes</div>
        <div class="th-pct" style="color:${col};font-size:${compact?'22px':'28px'}">${pct}%</div>
        <div class="th-label">${th.label||'—'}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="th-badge" style="background:${bg};color:${col}">
          <span style="width:7px;height:7px;border-radius:50%;background:${col};display:inline-block;flex-shrink:0"></span>
          ${badge}
          <div class="th-tooltip">${th.tooltip||th.label||'—'}</div>
        </div>
        ${th.overdue>0?`<div style="font-size:11px;color:var(--r);margin-top:5px;font-weight:600">${th.overdue} vencidas</div>`:''}
      </div>
    </div>
    <div class="th-bar-bg"><div class="th-bar" style="width:${pct}%;background:${col}"></div></div>
    ${compact?'':meta}
  </div>`;
}

// ===== DASHBOARD — SEM CARDS DUPLICADOS =====
async function renderDashboard(){
  const app=document.getElementById("app");
  const [dash,comp,byField,thermo,finSum]=await Promise.all([
    sf(`${API}/dashboard`),sf(`${API}/compliance/summary`),sf(`${API}/compliance/by_field`),
    sf(`${API}/conditions/conformity-indicator`),sf(`${API}/financial/summary`)
  ]);
  const d=dash||{},c=comp||{},sc=c.status_counts||{};
  const th=thermo||{pct:0,level:"gray",label:"Sem dados",tooltip:"",pct_active:0,critical_overdue:0,total:0,completed:0,overdue:0};
  const bf=byField||{all_fields:[],conditions_by_field:[]};
  const fs=finSum||{total_realizado:0,total_provisionado:0};
  const nCrit=(sc.critical||0)+(sc.expired||0)+(sc.missing||0);
  const topField=(bf.all_fields||[]).find(f=>f.wells_critical>0);
  let exec=`<strong>${d.total_assets||0}</strong> ativos monitorados.`;
  if(th.critical_overdue>0)exec+=` <span style="color:var(--r);font-weight:600">${th.critical_overdue} condicionantes críticas vencidas.</span>`;
  if(nCrit>0)exec+=` ${nCrit} ativos sem cobertura regulatória.`;
  if(topField)exec+=` Campo <strong>${topField.field}</strong> com maior exposição.`;
  exec+=` Conformidade: <strong style="color:${th.level==='green'?'var(--p)':th.level==='red'?'var(--r)':'var(--wt)'}">${th.pct}%</strong>.`;

  const maxW=Math.max(1,...(bf.all_fields||[]).map(x=>x.total_wells||0));
  const fieldBars=(bf.all_fields||[]).slice(0,6).map(f=>{
    const lic=f.wells_licensed||0;const pct=Math.round(lic/f.total_wells*100);
    const col=pct===100?"var(--p)":pct>=70?"var(--wg)":"var(--r)";
    return`<li class="bitem"><span class="blbl" title="${f.field}">${(f.field||'').slice(0,15)}</span><span class="btrack"><span class="bfill" style="width:${Math.round(lic/maxW*100)}%;background:${col}"></span></span><span class="bval">${lic}/${f.total_wells} (${pct}%)</span></li>`;
  }).join('')||'<div class="empty">Sem dados</div>';

  const maxC=Math.max(1,...(bf.conditions_by_field||[]).map(x=>x.total_conditions||0));
  const condBars=(bf.conditions_by_field||[]).slice(0,6).map(f=>{
    const atd=f.total_conditions-(f.expired_conditions||0);
    return`<li class="bitem"><span class="blbl" title="${f.field}">${(f.field||'').slice(0,15)}</span><span class="btrack"><span class="bfill" style="width:${maxC?Math.round(atd/maxC*100):0}%;background:var(--pl)"></span></span><span class="bval">${atd}/${f.total_conditions}</span></li>`;
  }).join('')||'<div class="empty">Sem dados</div>';

  // KPIs incluem produção/injeção — NÃO há cards separados abaixo
  app.innerHTML=`
    <div class="ph"><h1>Visão executiva</h1><p class="sub">Conformidade regulatória · ${d.total_assets||0} ativos</p></div>
    <div style="background:var(--s);border:1px solid var(--bdl);border-radius:var(--rad);padding:11px 15px;margin-bottom:12px;font-size:13px;color:var(--t2);line-height:1.6;box-shadow:var(--sh)">${exec}</div>

    <div class="kpis">
      <div class="kpi"><div class="kl">Ativos</div><div class="kv">${d.total_assets||0}</div><div class="ks">${d.total_licenses||0} licenças</div></div>
      <div class="kpi"><div class="kl">Condicionantes</div><div class="kv">${d.total_conditions||0}</div>${(d.overdue||0)>0?`<span class="kdelta dr">▼ ${d.overdue} vencidas</span>`:''}</div>
      <div class="kpi"><div class="kl">Em produção</div><div class="kv" style="color:var(--p)">${c.producing?.total||0}</div><div class="ks" style="color:${(c.producing?.non_compliance||0)>0?'var(--r)':'var(--t3)'}">${c.producing?.non_compliance||0} sem cobertura</div></div>
      <div class="kpi"><div class="kl">Em injeção</div><div class="kv" style="color:var(--b)">${c.injecting?.total||0}</div><div class="ks" style="color:${(c.injecting?.non_compliance||0)>0?'var(--r)':'var(--t3)'}">${c.injecting?.non_compliance||0} sem cobertura</div></div>
      <div class="kpi"><div class="kl">Provisionado</div><div class="kv fmtbrl" style="font-size:16px">${fmtBRL(fs.total_provisionado)}</div><div class="ks">Real.: ${fmtBRL(fs.total_realizado)}</div></div>
    </div>

    ${renderThermo(th)}

    <div class="g2">
      <div class="card"><div class="ct">Ativos licenciados por campo</div><ul class="blist">${fieldBars}</ul></div>
      <div class="card"><div class="ct">Condicionantes por campo</div><ul class="blist">${condBars}</ul></div>
    </div>`;
}

// ===== CONDITIONS =====
async function renderConditions(){
  const app=document.getElementById("app");
  condState.expandedIds=new Set();
  app.innerHTML='<div class="loading"><span class="spin"></span></div>';
  const fields=await sf(`${API}/conditions/fields`)||[];
  const fopts=fields.map(f=>`<option value="${f}">${f}</option>`).join('');

  app.innerHTML=`
    <div class="ph"><h1>Condicionantes</h1><p class="sub">Painel operacional de conformidade</p></div>
    <div id="cond-thermo"></div>
    <div class="fchips" id="fchips">
      <span class="fchip on" data-f="all" onclick="setCondFilter('all')">Todas</span>
      <span class="fchip red" data-f="overdue" onclick="setCondFilter('overdue')"><span class="fchip-dot"></span>Vencidas</span>
      <span class="fchip amber" data-f="upcoming" onclick="setCondFilter('upcoming')">Próximos 30d</span>
      <span class="fchip" data-f="operational" onclick="setCondFilter('operational')">Ativos operacionais</span>
      <span class="fchip" data-f="pending" onclick="setCondFilter('pending')">Pendentes</span>
      <span class="fchip green" data-f="completed" onclick="setCondFilter('completed')">Concluídas</span>
      <span class="fchip" data-f="queue" onclick="setCondFilter('queue')">🔴 Fila — poços ativos</span>
    </div>
    <div class="toolbar">
      <select class="sel" id="condField" style="min-width:170px" onchange="applyCondField()">
        <option value="">Campo: todos</option>${fopts}
      </select>
      <button class="btn btn-g btn-sm" onclick="collapseAll()">Recolher todos</button>
      <button class="btn btn-sm btn-a" onclick="expandAll()">Expandir todos</button>
    </div>
    <div id="cond-summary" style="margin-bottom:10px"></div>
    <div id="cond-list"><div class="loading"><span class="spin"></span></div></div>`;

  await loadConditions();
}

async function loadConditions(){
  const thermoDiv=document.getElementById("cond-thermo");
  const listDiv=document.getElementById("cond-list");
  const summDiv=document.getElementById("cond-summary");
  if(listDiv)listDiv.innerHTML='<div class="loading"><span class="spin"></span></div>';

  const field=condState.field;
  const isQueue=condState.filter==="queue";
  const sf_filter=isQueue?null:condState.filter==="all"?null:condState.filter;
  const params=new URLSearchParams();
  if(field)params.set("field",field);
  if(sf_filter)params.set("status_filter",sf_filter);

  const [panelData,indicator]=await Promise.all([
    isQueue
      ? sf(`${API}/conditions/queue${field?'?field='+encodeURIComponent(field):''}`)
      : sf(`${API}/conditions/panel?${params}`),
    sf(`${API}/conditions/conformity-indicator?${field?'field='+encodeURIComponent(field):''}`)
  ]);

  const items=(panelData?.items)||[];
  const summ=(panelData?.summary)||{};
  condState.allItems=items;
  condState.indicator=indicator||{pct:0,level:"gray",label:"Sem dados",tooltip:"",pct_active:0,critical_overdue:0,total:0,completed:0,overdue:0};

  if(thermoDiv)thermoDiv.innerHTML=renderThermo(condState.indicator,true);

  if(summDiv){
    if(isQueue){
      summDiv.innerHTML=`<div class="sbar">🔴 <strong>Fila — poços ativos</strong>: condicionantes de ativos em produção/injeção, ordenadas por urgência (vencidas → próximas do vencimento → pendentes) · ${items.length} item${items.length!==1?'s':''}</div>`;
    }else{
      summDiv.innerHTML=`<div class="sbar"><strong>${summ.total||0}</strong> condicionantes · <strong style="color:var(--p)">${summ.completed||0}</strong> concluídas · <strong style="color:var(--wt)">${summ.partial||0}</strong> parciais · <strong style="color:var(--r)">${summ.overdue||0}</strong> vencidas</div>`;
    }
  }

  if(!items.length){
    if(listDiv)listDiv.innerHTML='<div class="card"><div class="empty">Nenhuma condicionante encontrada para este filtro</div></div>';
    return;
  }
  renderCondList(items,listDiv);
}

function renderCondList(items,container){
  if(!container)return;
  container.innerHTML=items.map(item=>renderCondCard(item)).join('');
}

function renderCondCard(item){
  const isExp=condState.expandedIds.has(item.id);
  const cc=CAT_COLOR[item.category]||"#86868b";
  const cn=CAT_NAME[item.category]||item.category;
  let bCol="var(--bd)",sBadge='<span class="badge b-pe">Pendente</span>';
  if(item.status==="completed"){bCol="var(--pl)";sBadge='<span class="badge b-dn">Concluída</span>';}
  else if(item.status==="partial"){bCol="var(--w)";sBadge=`<span class="badge b-pt">Parcial ${item.n_completed}/${item.n_assets}</span>`;}
  else if(item.is_critical&&item.days_until_due!==null&&item.days_until_due<0){bCol="var(--r)";sBadge='<span class="badge b-cr">⚠ Crítica vencida</span>';}
  else if(item.days_until_due!==null&&item.days_until_due<0){bCol="var(--r)";sBadge='<span class="badge b-ex">Vencida</span>';}
  else if(item.days_until_due!==null&&item.days_until_due<=30){bCol="var(--w)";sBadge=`<span class="badge b-up">${item.days_until_due}d</span>`;}

  const pct=item.progress_pct||0;
  const progCol=pct===100?"var(--pl)":pct>0?"var(--w)":"var(--bd)";
  const desc=item.description||'';
  const shortDesc=desc.length>160?desc.slice(0,160)+'…':desc;
  const progHtml=item.n_assets>0
    ?`<div class="ccard-prog"><div class="cpbar"><div class="cpfill" style="width:${pct}%;background:${progCol}"></div></div><span class="cplbl">${item.n_completed}/${item.n_assets} ativos · ${pct}%</span></div>`
    :item.status==="completed"?`<div class="ccard-prog"><div class="cpbar"><div class="cpfill" style="width:100%;background:var(--pl)"></div></div><span class="cplbl">Concluída</span></div>`:''

  const bodyHtml=isExp?`
    <div class="ccard-body">
      <div class="ccard-full-desc">${desc}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.04em">Ativos vinculados (${item.n_assets})</div>
        ${item.status!=="completed"&&item.n_assets>1?`<button class="btn btn-sm btn-a" onclick="doCompleteAll(${item.id},event)">✓ Dar baixa em todos</button>`:''}
      </div>
      <div class="ccard-asset-list">${renderAssetList(item)}</div>
      ${item.status!=="completed"&&item.n_assets===0?`<button class="btn btn-sm" style="margin-top:10px" onclick="doSingleBaixa(${item.id})">Dar baixa</button>`:''}
    </div>`:''

  return`<div class="ccard" id="ccard-${item.id}" style="border-left-color:${bCol}">
    <div class="ccard-head" onclick="toggleCard(${item.id})">
      <div style="flex:1;min-width:0">
        <div class="ccard-meta">
          <span class="ccat" style="background:${cc}18;color:${cc}">${cn}</span>
          ${sBadge}
          ${item.is_critical?'<span class="badge b-cr">Crítica</span>':''}
          ${item.due_date?`<span style="font-size:11px;color:var(--t3)">Vence ${item.due_date}</span>`:''}
          <span style="font-size:11px;color:var(--t3)">Lic. <strong>${item.license_number||'—'}</strong></span>
          ${item.field?`<span style="font-size:11px;color:var(--t3)">${item.field}</span>`:''}
        </div>
        <div class="ccard-title">${isExp?desc:shortDesc}</div>
        ${progHtml}
      </div>
      <div style="flex-shrink:0;padding-left:8px;color:var(--t3);font-size:12px">${isExp?'▲':'▼'}</div>
    </div>
    ${bodyHtml}
  </div>`;
}

function renderAssetList(item){
  return item.assets.map(a=>{
    const done=a.status==="completed";
    const isOp=OPERATIONAL.includes(a.situation);
    return`<div class="cas-item">
      <div class="cas-code">${a.code}</div>
      <div class="cas-field">${a.field||'—'} ${isOp?`<span class="badge b-ok" style="font-size:10px">${(a.situation||'').slice(0,10)}</span>`:''}</div>
      <div>
        ${done
          ?`<div class="cas-done"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Concluído${a.completed_at?` <span style="font-size:10px;color:var(--t3)">${a.completed_at.slice(0,10)}</span>`:''}</div>`
          :`<button class="cas-btn" onclick="event.stopPropagation();openBaixaModal(${item.id},${a.id},'${a.code.replace(/'/g,"")}','${(item.license_number||'').replace(/'/g,"")}')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Dar baixa</button>`
        }
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id){
  if(condState.expandedIds.has(id))condState.expandedIds.delete(id);
  else condState.expandedIds.add(id);
  const item=condState.allItems.find(i=>i.id===id);
  if(!item)return;
  const el=document.getElementById(`ccard-${id}`);
  if(el){const tmp=document.createElement('div');tmp.innerHTML=renderCondCard(item);el.replaceWith(tmp.firstChild);}
}

function expandAll(){condState.expandedIds=new Set(condState.allItems.map(i=>i.id));renderCondList(condState.allItems,document.getElementById("cond-list"));}

async function doBaixaAtivo(condId,assetId,assetCode){
  const resp=document.getElementById("bx-resp")?.value||"";
  const obs=document.getElementById("bx-obs")?.value||"";
  closeMod();
  const r=await sf(`${API}/conditions/${condId}/assets/${assetId}/complete`,{
    method:"PATCH",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({completed_by:resp,observation:obs,evidence_url:""})
  });
  if(r&&r.ok){
    showToast(`✓ ${assetCode} concluído`);
    const item=condState.allItems.find(i=>i.id===condId);
    if(item){
      const a=item.assets.find(x=>x.id===assetId);
      if(a){a.status="completed";a.completed_at=new Date().toISOString();}
      item.n_completed=item.assets.filter(x=>x.status==="completed").length;
      item.progress_pct=item.n_assets>0?Math.round(item.n_completed/item.n_assets*100):100;
      if(item.n_completed>=item.n_assets)item.status="completed";
      else if(item.n_completed>0)item.status="partial";
      condState.expandedIds.add(condId);
      const el=document.getElementById(`ccard-${condId}`);
      if(el){const tmp=document.createElement('div');tmp.innerHTML=renderCondCard(item);el.replaceWith(tmp.firstChild);}
    }
    // Atualiza indicador em background
    sf(`${API}/conditions/conformity-indicator`).then(ind=>{
      if(ind){condState.indicator=ind;const td=document.getElementById("cond-thermo");if(td)td.innerHTML=renderThermo(condState.indicator,true);}
    });
  }else{alert("Erro: "+(r?.error||"sem resposta"));}
}

async function doCompleteAll(condId,event){
  event.stopPropagation();
  if(!confirm("Dar baixa em TODOS os ativos desta condicionante?"))return;
  const r=await sf(`${API}/conditions/${condId}/complete-all`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({completed_by:"sistema",observation:""})});
  if(r&&r.ok){
    showToast(`✓ ${r.assets_completed} ativos concluídos`);
    const item=condState.allItems.find(i=>i.id===condId);
    if(item){
      item.assets.forEach(a=>{a.status="completed";a.completed_at=new Date().toISOString();});
      item.n_completed=item.n_assets;item.progress_pct=100;item.status="completed";
      condState.expandedIds.add(condId);
      const el=document.getElementById(`ccard-${condId}`);
      if(el){const tmp=document.createElement('div');tmp.innerHTML=renderCondCard(item);el.replaceWith(tmp.firstChild);}
    }
  }else alert("Erro: "+(r?.error||"sem resposta"));
}

async function doSingleBaixa(condId){
  if(!confirm("Dar baixa nesta condicionante?"))return;
  const r=await sf(`${API}/conditions/${condId}/complete-all`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({completed_by:"sistema",observation:""})});
  if(r&&r.ok){showToast("✓ Condicionante concluída");loadConditions();}
  else alert("Erro");
}

function buildAP(){const p=new URLSearchParams();if(assetState.filters.aAg)p.set("agency",assetState.filters.aAg);if(assetState.filters.aOp)p.set("operational",assetState.filters.aOp);if(assetState.filters.aSt)p.set("compliance_status",assetState.filters.aSt);if(assetState.search)p.set("search",assetState.search);return p;}
async function loadAssets(){
  const p=buildAP();p.set("limit","50");p.set("offset",String(assetState.page*50));
  const div=document.getElementById("aRes");div.innerHTML='<div class="loading"><span class="spin"></span></div>';
  const r=await sf(`${API}/assets/unified?${p}`,{timeout:30000});
  if(!r?.items?.length){div.innerHTML='<div class="tw"><div class="empty">Nenhum ativo encontrado</div></div>';return;}
  const crit=r.items.filter(i=>["expired","missing","critical"].includes(i.compliance_status)).length;
  const rows=r.items.map(a=>{
    const pdf=a.pdf_url?`<a class="pdf-btn" href="${a.pdf_url}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="12" y2="18"/><line x1="15" y1="15" x2="12" y2="18"/></svg>PDF</a>`:'<span style="color:var(--t4);font-size:12px">—</span>';
    return`<tr><td><strong style="font-size:12.5px">${a.code||'—'}</strong></td><td style="color:var(--t2)">${a.field||'—'}</td><td style="color:var(--t2)">${a.agency||'—'}</td><td>${bSit(a.situation)}</td><td>${bComp(a.compliance_status)}</td><td style="font-size:11.5px;color:var(--t2)">${a.expiry_date||'—'}</td><td>${pdf}</td></tr>`;
  }).join('');
  const tp=Math.ceil(r.total/50),cur=assetState.page+1;
  div.innerHTML=`<div class="sbar">Mostrando <strong>${r.items.length}</strong> de <strong>${r.total}</strong> · <strong>${crit}</strong> críticos</div><div class="tw"><table><thead><tr><th>Código</th><th>Campo</th><th>Órgão</th><th>Situação</th><th>Status</th><th>Validade</th><th>PDF</th></tr></thead><tbody>${rows}</tbody></table></div><div class="pag"><span>Pág ${cur}/${tp}</span><div style="display:flex;gap:6px"><button class="btn btn-g" id="aPv" ${assetState.page===0?"disabled":""}>← Ant.</button><button class="btn btn-g" id="aNx" ${cur>=tp?"disabled":""}>Próx. →</button></div></div>`;
  document.getElementById("aPv").onclick=()=>{if(assetState.page>0){assetState.page--;loadAssets();}};
  document.getElementById("aNx").onclick=()=>{if(cur<tp){assetState.page++;loadAssets();}};
}
function exportAssets(){window.open(`${API}/assets/export?${buildAP()}`,'_blank');}

async function uploadDoc(docType){
  const fi=document.getElementById(docType==="license"?"pdfFile":"billetFile");
  const stat=document.getElementById(docType==="license"?"upStatus":"billetStatus");
  const file=fi?.files[0];if(!file)return;
  pendingFile=file;
  stat.innerHTML='<div class="loading" style="padding:8px 0"><span class="spin"></span> IA analisando… (30–90s)</div>';
  const fd=new FormData();fd.append("file",file);
  try{
    const r=await fetch(`${API}/licenses/upload?on_duplicate=ask&doc_type=${docType}`,{method:"POST",body:fd}).then(r=>r.json());
    if(r.error)stat.innerHTML=`<div class="emsg">Erro: ${r.error}</div>`;

let passiveDissolutionYears = 5;
const OPERATIONAL_FALLBACK_TARGET = 0.60;

function asArray(v){return Array.isArray(v)?v:[];}
function safeObj(v,fallback={}){return v&&typeof v==="object"&&!Array.isArray(v)&&!v.error?v:fallback;}
function num(v){const n=Number(v);return Number.isFinite(n)?n:0;}
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function pct(v){return `${Math.round(num(v))}%`;}

function getBudgetStore(){
  try{return JSON.parse(localStorage.getItem("envlicense_monthly_budget")||"{}");}

}
function setBudgetStore(obj){

function budgetForMonth(label){
  const b=getBudgetStore();
  return num(b[String(label||"").trim()]);
}
function safeBudgetId(label){

}

function normalizeFinanceData(fs,months){
  const monthly=asArray(months).map(m=>{
    const realized=num(m.realizado);
    const budget=budgetForMonth(m.label);
    const variance=budget-realized;
    return{
      label:m.label||"",
      realized,
      budget,
      variance,
      status:budget<=0?"no_budget":variance<0?"over_budget":variance===0?"on_budget":"under_budget"
    };
  });

  const realizedFromMonths=monthly.reduce((s,m)=>s+m.realized,0);
  const budgetTotal=monthly.reduce((s,m)=>s+m.budget,0);

  const totalMapped=num(
    fs.total_liability ??
    fs.mapped_liability_total ??
    fs.total_provisionado
  );

  const operationalMappedRaw=num(
    fs.operational_liability_total ??
    fs.passivo_operacional ??
    fs.operational_total
  );

  const hasOperationalSource=operationalMappedRaw>0;
  const operationalMapped=hasOperationalSource
    ?Math.min(operationalMappedRaw,totalMapped)
    :Math.round(totalMapped*OPERATIONAL_FALLBACK_TARGET);

  return{
    realized_total:realizedFromMonths || num(fs.total_realizado),
    mapped_liability_total:totalMapped,
    operational_liability_total:operationalMapped,
    has_operational_source:hasOperationalSource,
    budget_total:budgetTotal,
    budget_balance:budgetTotal-(realizedFromMonths || num(fs.total_realizado)),
    monthlySeries:monthly
  };
}

function buildScenarioRows(totalMapped,operationalMapped,totalRealized,yearsToDissolve){
  totalMapped=num(totalMapped);
  operationalMapped=Math.min(num(operationalMapped),totalMapped);
  totalRealized=num(totalRealized);
  yearsToDissolve=Math.max(1,Number(yearsToDissolve)||5);

  const currentYear=new Date().getFullYear();
  const years=Array.from({length:5},(_,i)=>currentYear+i+1);

  const annualCapacity=totalRealized>0
    ?Math.max(1,Math.round(totalRealized/2))
    :0;

  const excellenceTarget=totalMapped;
  const operationalTarget=operationalMapped;

  const excellenceAnnual=yearsToDissolve>0?excellenceTarget/yearsToDissolve:0;
  const operationalAnnual=yearsToDissolve>0?operationalTarget/yearsToDissolve:0;

  let remainingCurrent=totalMapped;
  let remainingExcellence=totalMapped;

  let remainingOperationalTarget=operationalTarget;
  let operationalCompanyResidual=totalMapped;

  const rows=years.map((year,i)=>{
    const currentInvestment=Math.min(remainingCurrent,annualCapacity);

    const excellenceInvestment=i<yearsToDissolve
      ?Math.min(remainingExcellence,excellenceAnnual)
      :0;

    const operationalInvestment=i<yearsToDissolve
      ?Math.min(remainingOperationalTarget,operationalAnnual)
      :0;

    remainingCurrent=Math.max(0,remainingCurrent-currentInvestment);
    remainingExcellence=Math.max(0,remainingExcellence-excellenceInvestment);

    remainingOperationalTarget=Math.max(0,remainingOperationalTarget-operationalInvestment);
    operationalCompanyResidual=Math.max(
      0,
      totalMapped-(operationalTarget-remainingOperationalTarget)
    );

    return{
      year,

      current:Math.round(currentInvestment),
      current_residual:Math.round(clamp(remainingCurrent,0,totalMapped)),

      operational:Math.round(operationalInvestment),
      operational_residual:Math.round(clamp(remainingOperationalTarget,0,operationalTarget)),
      operational_company_residual:Math.round(clamp(operationalCompanyResidual,0,totalMapped)),

      excellence:Math.round(excellenceInvestment),
      excellence_residual:Math.round(clamp(remainingExcellence,0,totalMapped))
    };
  });

  function totalInvest(key){return rows.reduce((s,r)=>s+num(r[key]),0);}
  function finalResidual(key){return rows.length?num(rows[rows.length-1][`${key}_residual`]):0;}
  function completionYear(key){
    const r=rows.find(x=>num(x[`${key}_residual`])<=0);
    return r?r.year:null;
  }

  const operationalCompanyFinal=rows.length?num(rows[rows.length-1].operational_company_residual):totalMapped;
  const operationalCompanyTreated=totalMapped-operationalCompanyFinal;

  return{
    annual_execution_capacity:annualCapacity,
    rows,
    scenarios:{
      current:{
        key:"current",
        name:"Cenário atual",
        objective:annualCapacity>0?"Mantém o ritmo histórico de execução":"Sem ritmo histórico suficiente",
        investment:totalInvest("current"),
        annual_avg:totalInvest("current")/5,
        final_passive:finalResidual("current"),
        completion_year:completionYear("current"),
        treated_pct:totalMapped>0?clamp((totalMapped-finalResidual("current"))/totalMapped*100,0,100):100,
        residual_label:"Passivo residual companhia"
      },
      operational:{
        key:"operational",
        name:"Continuidade operacional",
        objective:"Trata 100% dos passivos vinculados a poços ativos",
        investment:totalInvest("operational"),
        annual_avg:totalInvest("operational")/yearsToDissolve,
        final_passive:finalResidual("operational"),
        company_final_passive:operationalCompanyFinal,
        company_treated_pct:totalMapped>0?clamp(operationalCompanyTreated/totalMapped*100,0,100):100,
        company_postponed_pct:totalMapped>0?clamp(operationalCompanyFinal/totalMapped*100,0,100):0,
        completion_year:completionYear("operational"),
        treated_pct:operationalTarget>0?100:0,
        residual_label:"Residual operacional"
      },
      excellence:{
        key:"excellence",
        name:"Excelência operacional",
        objective:"Elimina 100% do passivo mapeado da companhia",
        investment:totalInvest("excellence"),
        annual_avg:totalInvest("excellence")/yearsToDissolve,
        final_passive:finalResidual("excellence"),
        completion_year:completionYear("excellence"),
        treated_pct:100,
        residual_label:"Passivo residual companhia"
      }
    }
  };
}

    </li>`).join(""):`<div class="empty">Sem dados por categoria.</div>`;

  app.innerHTML=`
    <div class="ph">
      <h1>Gestão financeira regulatória</h1>
      <p class="sub">Budget, passivo mapeado e simulação de dissolução</p>
    </div>

    <div class="kpis">

      <div class="kpi">
        <div class="kl">Budget disponível</div>

        <div class="ks">Planejado manualmente</div>
      </div>

      </div>
      <div class="kpi">
        <div class="kl">Passivo mapeado</div>
        <div class="kv fmtbrl" style="font-size:17px">${fmtBRL(finance.mapped_liability_total)}</div>
        <div class="ks">Base da simulação</div>

    </div>

    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px">
        <div>
          <div class="ct" style="margin-bottom:4px">Curva financeira mensal — realizado vs budget</div>
          <div style="font-size:12px;color:var(--t3)">A escala considera o maior valor entre realizado e budget.</div>
        </div>
        <button class="btn btn-sm btn-g" onclick='openBudgetModal(${JSON.stringify(months).replace(/'/g,"&#39;")})'>+ Adicionar budget</button>
      </div>
      ${finance.monthlySeries.length?`
        ${renderMonthlyBudgetChart(finance.monthlySeries)}
        <div class="fin-legend" style="margin-top:8px">
          <div class="fin-leg-item"><div class="fin-leg-dot" style="background:var(--p)"></div>Realizado dentro do budget</div>
          <div class="fin-leg-item"><div class="fin-leg-dot" style="background:var(--r)"></div>Realizado acima do budget</div>
          <div class="fin-leg-item"><div class="fin-leg-dot" style="background:var(--b);opacity:.25;border:1.5px dashed var(--b)"></div>Budget</div>
        </div>`:`<div class="empty">Sem curva mensal disponível.</div>`}
    </div>

    <div class="g2">
      <div class="card"><div class="ct">Custo por campo</div><ul class="blist">${fieldBars}</ul></div>
      <div class="card"><div class="ct">Custo por categoria</div><ul class="blist">${catBars}</ul></div>
    </div>

    <div class="card" style="margin-bottom:12px">
      <div class="ct">Simulador de dissolução do passivo</div>
      <div style="font-size:12.5px;color:var(--t2);margin-bottom:12px">

      ${renderDissolutionControls()}

      ${finance.has_operational_source?"":

        </div>`}

      <div class="g3" style="margin-bottom:0">
        ${renderScenarioCard(scenarios.current,rows,finance.mapped_liability_total,finance.operational_liability_total,"var(--b)")}
        ${renderScenarioCard(scenarios.operational,rows,finance.mapped_liability_total,finance.operational_liability_total,"var(--wg)")}

      <div style="font-size:11px;color:var(--t3);margin-top:10px">

show("dashboard");
